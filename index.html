<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventOps ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ── CORPORATE IDENTITY ── EventOps v2 ────────────────────────
     Font:    Plus Jakarta Sans 400/500/600/700
     Max bold: 700 — no 800/900 anywhere
     Palette: Deep navy · Refined indigo · Warm white
  ──────────────────────────────────────────────────────────────── */
  :root{
    --bg:    #06080F;
    --bg2:   #0A0D1A;
    --panel: #0F1323;
    --panel2:#141929;
    --line:  rgba(148,163,184,.1);
    --txt:   #DDE3F0;
    --muted: #7B8BAD;
    --accent:#5462F0;
    --accent2:#0BB5CC;
    --good:  #22C55E;
    --warn:  #F59E0B;
    --bad:   #F43F5E;
    --grad:  linear-gradient(135deg,#5462F0 0%,#8B5CF6 52%,#0BB5CC 100%);
    --shadow:0 4px 24px rgba(0,0,0,.45);
    --radius:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  *,-webkit-font-smoothing{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
  body{background:var(--bg);color:var(--txt);font-family:'Plus Jakarta Sans',-apple-system,Segoe UI,sans-serif;font-size:15px;line-height:1.6}
  button{font-family:inherit;cursor:pointer}input,select,textarea{font-family:inherit}

  .grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-weight:700}

  /* LAYOUT */
  #app{display:flex;min-height:100vh}
  .side{width:232px;background:var(--bg2);border-right:1px solid var(--line);padding:20px 14px;flex-shrink:0;display:flex;flex-direction:column}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1rem;padding:4px 8px 18px;letter-spacing:-.01em}
  .brand .m{width:30px;height:30px;border-radius:9px;background:var(--grad);display:grid;place-items:center;font-size:14px;flex-shrink:0}
  .nav-i{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:10px;color:var(--muted);font-weight:500;margin-bottom:1px;transition:.15s;font-size:.875rem;cursor:pointer;letter-spacing:.005em}
  .nav-i:hover{background:var(--panel);color:var(--txt)}
  .nav-i.active{background:var(--panel);color:var(--txt);box-shadow:inset 3px 0 0 var(--accent)}
  .nav-i .ic{width:20px;text-align:center;font-size:.95rem}
  .side-foot{margin-top:auto;padding-top:16px;border-top:1px solid var(--line);font-size:.75rem;color:var(--muted);line-height:1.7}
  .logoutb{margin-top:8px;width:100%;text-align:left}
  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .top{display:flex;align-items:center;justify-content:space-between;padding:13px 24px;border-bottom:1px solid var(--line);background:rgba(10,13,26,.75);backdrop-filter:blur(14px);position:sticky;top:0;z-index:20}
  .top .evt{display:flex;align-items:center;gap:10px}
  .top select{background:var(--panel);color:var(--txt);border:1px solid var(--line);padding:8px 13px;border-radius:9px;font-size:.85rem;font-family:inherit}
  .role-tag{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--muted)}
  .hamb{display:none;background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:9px;padding:7px 11px;font-size:1rem}
  .content{padding:26px;overflow:auto}

  /* TYPOGRAPHY */
  .pg-title{font-size:1.45rem;font-weight:700;letter-spacing:-.015em;margin-bottom:5px;color:var(--txt)}
  .pg-sub{color:var(--muted);margin-bottom:22px;font-size:.9rem;line-height:1.6}

  /* CARDS */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:22px;margin-bottom:16px}
  .grid{display:grid;gap:16px}.g4{grid-template-columns:repeat(4,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:1fr 1fr}
  @media(max-width:1050px){.g4{grid-template-columns:1fr 1fr}.g3,.g2{grid-template-columns:1fr}}

  /* BUTTONS */
  .btn{padding:9px 17px;border-radius:9px;font-weight:600;font-size:.84rem;border:none;transition:.18s;cursor:pointer;letter-spacing:.01em}
  .btn-p{background:var(--grad);color:#fff;box-shadow:0 2px 12px rgba(84,98,240,.3)}.btn-p:hover{filter:brightness(1.08);transform:translateY(-1px)}
  .btn-g{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}.btn-g:hover{background:rgba(255,255,255,.05);border-color:rgba(148,163,184,.22)}
  .btn-sm{padding:5px 12px;font-size:.78rem;border-radius:7px}

  /* KPI CARDS */
  .kpi .lbl{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-weight:600}
  .kpi .v{font-size:1.6rem;font-weight:700;margin-top:7px;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
  .kpi .d{font-size:.78rem;margin-top:5px;line-height:1.4}

  /* TABLES */
  table{width:100%;border-collapse:collapse;font-size:.875rem}
  th{text-align:left;color:var(--muted);font-weight:600;font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;padding:10px 12px;border-bottom:1px solid var(--line)}
  td{padding:11px 12px;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums;color:var(--txt)}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:rgba(255,255,255,.02)}

  /* BADGES */
  .badge{font-size:.7rem;font-weight:600;padding:4px 11px;border-radius:100px;white-space:nowrap;letter-spacing:.02em}
  .b-green{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
  .b-amber{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}
  .b-red{background:rgba(244,63,94,.12);color:#fb7185;border:1px solid rgba(244,63,94,.2)}
  .b-blue{background:rgba(84,98,240,.15);color:#818cf8;border:1px solid rgba(84,98,240,.2)}

  /* SECTION HEADER */
  .sec-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
  .sec-h h3{font-size:1rem;font-weight:600;color:var(--txt)}

  /* FORMS */
  .ipt{background:var(--bg2);border:1px solid var(--line);color:var(--txt);padding:10px 13px;border-radius:9px;width:100%;font-size:.875rem;line-height:1.5;transition:.15s}
  .ipt:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(84,98,240,.15)}
  .form-row{margin-bottom:12px}
  label.fl{font-size:.76rem;color:var(--muted);display:block;margin-bottom:6px;font-weight:500;letter-spacing:.02em}

  /* UTILITY */
  .pos{color:var(--good)}.neg{color:var(--bad)}.amb{color:var(--warn)}
  .empty{color:var(--muted);text-align:center;padding:30px;font-size:.9rem;line-height:1.7}
  .x{background:none;border:none;color:var(--muted);font-size:.95rem;cursor:pointer;transition:.15s;opacity:.7}.x:hover{color:var(--bad);opacity:1}
  input[type=range]{width:100%;-webkit-appearance:none;height:5px;border-radius:5px;background:var(--panel2)}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 2px 8px rgba(84,98,240,.4)}
  .note{font-size:.8rem;color:var(--muted);background:rgba(84,98,240,.06);border:1px solid rgba(84,98,240,.15);border-radius:10px;padding:12px 15px;margin-top:14px;line-height:1.6}
  .ripple-flag{margin-top:16px;padding:13px 16px;border-radius:11px;display:flex;align-items:center;gap:10px;font-size:.875rem}
  .pill{font-size:.76rem;padding:4px 12px;border-radius:100px;background:var(--panel2);border:1px solid var(--line);font-weight:500}
  .br{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);font-size:.9rem}.br:last-child{border:none}
  .br.tot{border-top:2px solid var(--accent);border-bottom:none;margin-top:8px;padding-top:14px;font-size:1.08rem;font-weight:700}
  .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:14px}
  .ga{background:var(--bg2);border:1px solid var(--line);border-radius:13px;overflow:hidden}
  .ga img{width:100%;height:120px;object-fit:cover;display:block}
  .ga .cap{padding:9px 11px;font-size:.8rem;display:flex;justify-content:space-between;align-items:center}
  .ga .typ{font-size:.67rem;color:var(--accent2);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
  .upbox{border:1.5px dashed rgba(148,163,184,.18);border-radius:13px;padding:28px;text-align:center;color:var(--muted);cursor:pointer;transition:.15s}
  .upbox:hover{border-color:var(--accent);color:var(--txt);background:rgba(84,98,240,.05)}

  /* MODAL */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(4px)}
  .modal-bg.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:26px;width:100%;max-width:460px;max-height:90vh;overflow:auto;box-shadow:var(--shadow)}
  .modal h3{margin-bottom:18px;font-size:1.05rem;font-weight:700}.modal-acts{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

  /* DOCUMENTS */
  #doc{position:fixed;inset:0;background:#4A4E6A;z-index:200;display:none;overflow:auto;padding:30px 0}
  #doc.show{display:block}
  .doc-bar{position:fixed;top:0;left:0;right:0;background:var(--panel);border-bottom:1px solid var(--line);padding:12px 20px;display:flex;justify-content:flex-end;gap:10px;z-index:210}
  .paper{background:#fff;color:#1c2033;max-width:790px;margin:64px auto 0;padding:56px 62px;border-radius:6px;box-shadow:0 24px 70px rgba(0,0,0,.45);font-size:13.5px;line-height:1.65;font-family:'Plus Jakarta Sans',sans-serif}
  .paper h1{font-size:1.65rem;color:#1c2033;margin-bottom:2px;font-weight:700}
  .paper h2{font-size:1rem;margin:28px 0 10px;color:#1c2033;border-bottom:2px solid #5462F0;padding-bottom:5px;font-weight:600}
  .paper table{font-size:12.5px}.paper th{color:#777;border-color:#e5e7eb;font-weight:600}.paper td{border-color:#f3f4f6;color:#1c2033}
  .paper .ph{color:#9CA3AF}.paper .pbr{display:flex;justify-content:space-between;padding:7px 0}
  .paper .pbr.t{font-weight:700;font-size:1.08rem;border-top:2px solid #1c2033;margin-top:8px;padding-top:12px}
  .paper .sig{margin-top:44px;display:flex;justify-content:space-between;gap:40px}
  .paper .sig div{flex:1;border-top:1px solid #374151;padding-top:7px;font-size:11px;color:#6B7280}
  .paper .imgrow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}.paper .imgrow img{width:100%;border-radius:6px;border:1px solid #E5E7EB}
  @media print{.doc-bar{display:none}#app,#modalBg{display:none!important}#doc{position:static;background:#fff;padding:0}.paper{box-shadow:none;margin:0;max-width:100%}}

  /* TOAST */
  #toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--panel2);border:1px solid var(--line);padding:11px 20px;border-radius:11px;font-size:.84rem;opacity:0;transition:.25s;z-index:300;pointer-events:none;text-align:center;box-shadow:var(--shadow)}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* RESPONSIVE */
  @media(max-width:760px){
    .side{position:fixed;left:0;top:0;bottom:0;z-index:60;transform:translateX(-100%);transition:.25s;box-shadow:0 0 60px rgba(0,0,0,.7)}
    .side.open{transform:none}
    .hamb{display:inline-block}.content{padding:16px}.top{padding:11px 16px}
    .role-tag span{display:none}
  }

  /* AUTH */
  .auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
  .auth-box{max-width:420px;width:100%;background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:34px;box-shadow:var(--shadow)}
  .auth-brand{display:flex;align-items:center;gap:11px;font-weight:700;font-size:1.25rem;margin-bottom:6px;letter-spacing:-.01em}
  .auth-brand .m{width:38px;height:38px;border-radius:11px;background:var(--grad);display:grid;place-items:center;font-size:18px}
  .auth-tabs{display:flex;margin:22px 0 20px;background:var(--bg2);border-radius:11px;padding:3px}
  .auth-tab{flex:1;text-align:center;padding:9px;border-radius:9px;cursor:pointer;font-size:.85rem;font-weight:600;color:var(--muted);transition:.15s}
  .auth-tab.on{background:var(--panel);color:var(--txt);box-shadow:0 1px 6px rgba(0,0,0,.3)}
  .auth-err{color:var(--bad);font-size:.82rem;margin-bottom:10px;min-height:18px}
  .auth-demo{margin-top:16px;padding:14px;background:var(--bg2);border:1px solid var(--line);border-radius:13px}
  .auth-demo-title{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--accent2);margin-bottom:10px;font-weight:600}
  .demo-user{display:flex;align-items:center;gap:11px;padding:10px 13px;border:1px solid var(--line);border-radius:11px;margin-bottom:6px;cursor:pointer;transition:.15s;background:var(--panel)}
  .demo-user:hover{border-color:var(--accent);background:rgba(84,98,240,.06)}
  .demo-av{width:34px;height:34px;border-radius:50%;background:var(--grad);display:grid;place-items:center;font-weight:600;font-size:.82rem;flex-shrink:0}
  .demo-user .nm{font-weight:600;font-size:.88rem}.demo-user .rl{font-size:.74rem;color:var(--muted)}

  /* LOGIN (role selector) */
  .login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .loginbox{max-width:390px;width:100%;background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:30px;box-shadow:var(--shadow)}
  .loginbox .lh{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1.2rem;margin-bottom:4px;letter-spacing:-.01em}
  .loginbox .lh .m{width:34px;height:34px;border-radius:10px;background:var(--grad);display:grid;place-items:center;font-size:16px}
  .lsec{font-size:.7rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin:20px 0 9px;font-weight:600}
  .luser{display:flex;align-items:center;gap:12px;padding:12px 15px;border:1px solid var(--line);border-radius:13px;margin-bottom:8px;cursor:pointer;transition:.15s;background:var(--bg2)}
  .luser:hover{border-color:var(--accent);transform:translateX(3px);background:rgba(84,98,240,.06)}
  .luser .av{width:38px;height:38px;border-radius:50%;background:var(--grad);display:grid;place-items:center;font-weight:600;font-size:.88rem;flex-shrink:0}
  .luser .nm{font-weight:600;font-size:.9rem}.luser .rl{font-size:.77rem;color:var(--muted)}
  .luser .arr{margin-left:auto;color:var(--muted);font-size:.85rem}

  /* FIELD APP */
  .fieldapp{max-width:460px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg2);position:relative}
  .fbar{background:var(--grad);padding:20px 18px 22px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .fbar .fapp{font-size:.68rem;opacity:.8;letter-spacing:.08em;font-weight:600}
  .fbar .fev{font-weight:700;font-size:1.15rem;margin-top:3px;letter-spacing:-.01em}
  .fbar .fmeta{font-size:.78rem;opacity:.88;margin-top:3px}
  .favatar{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.2);display:grid;place-items:center;font-weight:600;flex-shrink:0;font-size:.82rem}
  .fevsel{padding:12px 16px 0}
  .fbody{flex:1;padding:16px;padding-bottom:84px;overflow:auto}
  .ptab{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:4px 0 12px;font-weight:600}
  .duty{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 15px;margin-bottom:10px}
  .duty .dt{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .duty .tm{font-weight:700;font-size:1rem;letter-spacing:-.01em}
  .duty .ac{font-size:.9rem;line-height:1.5}.duty .ow{font-size:.74rem;color:var(--muted);margin-top:4px}
  .confbtn{border:none;border-radius:8px;padding:6px 13px;font-size:.74rem;font-weight:600;cursor:pointer;font-family:inherit}
  .upgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .upbtn{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:16px 8px;text-align:center;font-size:.82rem;cursor:pointer;color:var(--txt);transition:.15s}
  .upbtn:hover{border-color:var(--accent)}.upbtn .ic{font-size:1.4rem;display:block;margin-bottom:6px}
  .botnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:460px;background:var(--panel);border-top:1px solid var(--line);display:flex;z-index:40}
  .bn{flex:1;text-align:center;padding:10px 0 12px;color:var(--muted);font-size:.68rem;cursor:pointer;font-weight:500;transition:.15s}
  .bn .ic{display:block;font-size:1.2rem;margin-bottom:2px}
  .bn.active{color:var(--accent2)}
  /* COMMS HUB */
  .comms-wrap{display:grid;grid-template-columns:260px 1fr;gap:0;height:calc(100vh - 120px);min-height:400px;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:var(--panel)}
  @media(max-width:760px){.comms-wrap{grid-template-columns:1fr;height:auto}}
  .comms-sidebar{background:var(--bg2);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
  .comms-sidebar-head{padding:14px 16px;border-bottom:1px solid var(--line);font-weight:700;font-size:.95rem;display:flex;justify-content:space-between;align-items:center}
  .comms-groups{flex:1;overflow-y:auto;padding:8px}
  .cg-section{font-size:.66rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding:10px 8px 4px}
  .cg-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;transition:.15s;margin-bottom:2px}
  .cg-item:hover{background:var(--panel)}
  .cg-item.active{background:var(--panel);box-shadow:inset 3px 0 0 var(--accent)}
  .cg-item .cg-ic{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
  .cg-item .cg-name{font-size:.88rem;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cg-item .cg-badge{background:var(--accent);color:#fff;font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:100px;flex-shrink:0}
  .comms-main{display:flex;flex-direction:column;overflow:hidden}
  .comms-head{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;flex-shrink:0}
  .comms-head .ch-ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
  .comms-head .ch-title{font-weight:700;font-size:.95rem}
  .comms-head .ch-sub{font-size:.74rem;color:var(--muted)}
  .chat-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
  .cm{display:flex;gap:10px;max-width:80%}
  .cm.mine{flex-direction:row-reverse;align-self:flex-end}
  .cm .av{width:30px;height:30px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#fff;flex-shrink:0;margin-top:2px}
  .cm .bubble{padding:9px 13px;border-radius:14px;font-size:.84rem;line-height:1.5;word-break:break-word}
  .cm:not(.mine) .bubble{background:var(--panel2);border-bottom-left-radius:3px}
  .cm.mine .bubble{background:var(--accent);color:#fff;border-bottom-right-radius:3px}
  .cm .cm-meta{font-size:.68rem;color:var(--muted);margin-top:3px;text-align:right}
  .cm:not(.mine) .cm-meta{text-align:left}
  .chat-input-wrap{padding:12px 16px;border-top:1px solid var(--line);display:flex;gap:8px;flex-shrink:0}
  .chat-input-wrap textarea{flex:1;background:var(--bg2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:9px 13px;font-size:.86rem;resize:none;outline:none;font-family:inherit}
  .chat-input-wrap textarea:focus{border-color:var(--accent)}
  .chat-date-sep{text-align:center;font-size:.7rem;color:var(--muted);margin:8px 0;position:relative}
  .chat-date-sep::before,.chat-date-sep::after{content:'';position:absolute;top:50%;width:30%;height:1px;background:var(--line)}
  .chat-date-sep::before{left:0}.chat-date-sep::after{right:0}
  /* EVENT INFO */
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:900px){.info-grid{grid-template-columns:1fr}}

function markSettingsDirty(){const el=document.getElementById('settings-status');if(el){el.style.opacity='1';el.textContent='● unsaved changes';}}
function saveSettings(){save();const el=document.getElementById('settings-status');if(el){el.textContent='✓ Saved';el.style.color='var(--good)';el.style.opacity='1';clearTimeout(el._t);el._t=setTimeout(()=>{el.style.opacity='0';el.style.color='var(--muted)';},2500);}toast('Settings saved ✓');}

function uploadLogo(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const max=400;let w=img.width,h=img.height;
      if(w>max){h=h*max/w;w=max;}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      DB.org.logo=cv.toDataURL('image/png');
      save();vSettings();
    };
    img.src=r.result;
  };
  r.readAsDataURL(f);inp.value='';
}

async function fetchWeather(address){
  try{
    const geo=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address+', South Africa')}&format=json&limit=1`).then(r=>r.json());
    if(!geo||!geo[0]) return null;
    const {lat,lon}=geo[0];
    const wx=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Africa%2FJohannesburg&forecast_days=7`).then(r=>r.json());
    return wx.daily;
  }catch(e){return null;}
}

async function loadWeatherCard(){
  const addr=E().venue_address||E().venue;
  if(!addr){document.getElementById('wx-content').innerHTML='<div class="note">Add a venue address to load weather.</div>';return;}
  document.getElementById('wx-content').innerHTML='<div style="color:var(--muted);font-size:.85rem">Fetching forecast…</div>';
  const wx=await fetchWeather(addr);
  if(!wx){document.getElementById('wx-content').innerHTML='<div class="note">Could not load weather — check venue address.</div>';return;}
  const html=`<div class="wx-card">${wx.time.map((d,i)=>{
    const dt=new Date(d);const label=dt.toLocaleDateString('en-ZA',{weekday:'short',day:'numeric',month:'short'});
    const ic=WMO_IC[wx.weather_code[i]]||'🌡️';
    return`<div class="wx-day"><div class="wic">${ic}</div><div class="wdt">${label}</div><div class="wtmp">${Math.round(wx.temperature_2m_max[i])}° / ${Math.round(wx.temperature_2m_min[i])}°</div><div class="wrain">💧${wx.precipitation_probability_max[i]}%</div></div>`;
  }).join('')}</div>`;
  document.getElementById('wx-content').innerHTML=html;
}

async function loadCommsMessages(append=false){
  const box=document.getElementById('comms-msgs');if(!box)return;
  const gname=commsGroup;
  let q=sb.from('event_messages').select('*').eq('event_id',DB.currentEvent).eq('group_name',gname).order('created_at',{ascending:true}).limit(80);
  if(append&&commsLastTs) q=q.gt('created_at',commsLastTs);
  const {data,error}=await q;
  if(error){if(!append)box.innerHTML='<div class="empty">Could not load messages.</div>';return;}
  if(!data||!data.length){
    if(!append) box.innerHTML=`<div style="text-align:center;padding:40px 20px;color:var(--muted)"><div style="font-size:2rem;margin-bottom:8px">${groupIcon(gname.replace('dm:',''))}</div><div style="font-weight:700;margin-bottom:4px">${gname.startsWith('dm:')?'Direct message: '+gname.slice(3):gname}</div><div style="font-size:.83rem">No messages yet. Send the first one!</div></div>`;
    return;
  }
  const me=session?.name||supabaseUser?.email?.split('@')[0]||'';
  if(!append) box.innerHTML='';
  let lastDay='';
  data.forEach(msg=>{
    const d=new Date(msg.created_at);
    const dayStr=d.toLocaleDateString('en-ZA',{weekday:'long',day:'numeric',month:'long'});
    if(dayStr!==lastDay){
      lastDay=dayStr;
      const sep=document.createElement('div');sep.className='chat-date-sep';sep.textContent=dayStr;box.appendChild(sep);
    }
    const isMine=msg.sender_name===me;
    const el=document.createElement('div');el.className='cm'+(isMine?' mine':'');
    el.innerHTML=`${!isMine?`<div class="av" style="background:${groupColor(msg.sender_name)}">${initials(msg.sender_name)}</div>`:''}
      <div><div class="bubble">${escHtml(msg.content)}</div>
      <div class="cm-meta">${isMine?'':msg.sender_name+' · '}${d.toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'})}</div></div>`;
    box.appendChild(el);
  });
  commsLastTs=data[data.length-1].created_at;
  box.scrollTop=box.scrollHeight;
}

function escHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}

async function sendCommsMsg(){
  const ipt=document.getElementById('comms-ipt');if(!ipt)return;
  const content=ipt.value.trim();if(!content)return;
  if(!supabaseUser){toast('Sign in to send messages');return;}
  const senderName=session?.name||supabaseUser.email.split('@')[0];
  ipt.value='';
  const msg={id:uid(),event_id:DB.currentEvent,group_name:commsGroup,sender_id:supabaseUser.id,sender_name:senderName,content};
  const {error}=await sb.from('event_messages').insert(msg);
  if(error){toast('Send failed: '+error.message);ipt.value=content;return;}
  await loadCommsMessages();
}

function startCommsPoll(){
  stopCommsPoll();
  commsPollTimer=setInterval(async()=>{
    if(!document.getElementById('comms-msgs')) return stopCommsPoll();
    await loadCommsMessages(true);
  },4000);
}

function stopCommsPoll(){if(commsPollTimer){clearInterval(commsPollTimer);commsPollTimer=null;}}

function addCommsGroup(){

}

async function setAppStatus(appId,positionId,roleName,status){
  await sb.from('crew_applications').update({status}).eq('id',appId);

    const {data}=await sb.from('crew_applications').select('applicant_name,quote_amount').eq('id',appId).single();

      save();
    }
  }
  toast(status==='accepted'?'Applicant accepted ✓':'Application rejected');
  viewApplicants(positionId,roleName);
}

    <div class="auth-tabs"><div class="auth-tab ${cbAuthTab==='in'?'on':''}" onclick="cbAuthTab='in';showCBAuth()">Sign in</div><div class="auth-tab ${cbAuthTab==='up'?'on':''}" onclick="cbAuthTab='up';showCBAuth()">Join crew</div></div>
    <div class="auth-err" id="cb-auth-err"></div>
    <div class="form-row"><label class="fl">Your name</label><input class="ipt" id="cb-name" placeholder="Full name" ${cbAuthTab==='in'?'style="display:none"':''}></div>
    <div class="form-row"><label class="fl">Email</label><input class="ipt" id="cb-email" type="email" placeholder="you@email.com"></div>
    <div class="form-row"><label class="fl">Password</label><input class="ipt" id="cb-pass" type="password" placeholder="••••••••"></div>
    <button class="btn btn-p" style="width:100%;padding:11px;margin-top:4px" onclick="doCBAuth()">${cbAuthTab==='in'?'Sign in →':'Create account →'}</button>
    <button class="btn btn-g" style="width:100%;padding:9px;margin-top:8px" onclick="document.getElementById('cb-auth-overlay').remove()">Cancel</button>
  </div>`;
  document.body.appendChild(overlay);
}

async function doCBAuth(){
  const email=document.getElementById('cb-email').value.trim();
  const pass=document.getElementById('cb-pass').value;
  const name=document.getElementById('cb-name')?.value.trim()||'';
  const err=document.getElementById('cb-auth-err');
  err.textContent='';
  if(!email||!pass){err.textContent='Enter email and password.';return;}
  let res;
  if(cbAuthTab==='up'){
    res=await sb.auth.signUp({email,password:pass,options:{data:{full_name:name}}});
  } else {
    res=await sb.auth.signInWithPassword({email,password:pass});
  }
  if(res.error){err.textContent=res.error.message;return;}
  document.getElementById('cb-auth-overlay').remove();
  if(cbPendingPos){const pos=cbPendingPos;cbPendingPos=null;openApplyModal(pos);}
  else renderCrewBoard();
}

function openApplyModal(pos){
  sb.auth.getSession().then(({data:{session:s}})=>{
    if(!s){showCBAuth(pos);return;}
    const u=s.user;
    const existing=document.getElementById('cb-apply-overlay');
    if(existing)existing.remove();
    const overlay=document.createElement('div');
    overlay.id='cb-apply-overlay';
    overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;overflow:auto';
    overlay.innerHTML=`<div class="cb-auth-box" style="max-width:500px">
      <div class="ev" style="color:var(--accent2);font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">${pos.event_name}</div>
      <div style="font-weight:700;font-size:1.15rem;margin-bottom:2px">Apply: ${pos.role_name}</div>
      <div style="font-size:.82rem;color:var(--muted);margin-bottom:16px">${pos.event_venue} · ${pos.event_dates} · ${fmt(pos.rate)}/hr · ${pos.hours}hrs</div>
      <div class="auth-err" id="apply-err"></div>
      <div class="form-row"><label class="fl">Your name</label><input class="ipt" id="ap-name" value="${u.user_metadata?.full_name||''}"></div>
      <div class="form-row"><label class="fl">Email</label><input class="ipt" id="ap-email" value="${u.email}" readonly></div>
      <div class="form-row"><label class="fl">Your quoted rate for this contract (R total)</label><input class="ipt" id="ap-quote" type="number" placeholder="${pos.rate*pos.hours}"></div>
      <div class="form-row"><label class="fl">Cover note — experience, availability, why you're the right fit</label><textarea class="ipt" id="ap-msg" rows="3" placeholder="Tell the director about yourself…"></textarea></div>
      <div class="form-row"><label class="fl">Portfolio / website URL (optional)</label><input class="ipt" id="ap-port" placeholder="https://"></div>
      <button class="btn btn-p" style="width:100%;padding:11px;margin-top:4px" onclick="submitApplication('${pos.id}','${pos.role_name.replace(/'/g,'')}')">Submit application →</button>
      <button class="btn btn-g" style="width:100%;padding:9px;margin-top:8px" onclick="document.getElementById('cb-apply-overlay').remove()">Cancel</button>
    </div>`;
    document.body.appendChild(overlay);
  });
}

async function submitApplication(positionId,roleName){
  const err=document.getElementById('apply-err');
  err.textContent='';
  const {data:{session:s}}=await sb.auth.getSession();
  if(!s){err.textContent='Session expired. Please sign in again.';return;}
  const app={
    id:uid(),position_id:positionId,applicant_user_id:s.user.id,
    applicant_name:document.getElementById('ap-name').value.trim(),
    applicant_email:document.getElementById('ap-email').value.trim(),
    quote_amount:+document.getElementById('ap-quote').value||0,
    message:document.getElementById('ap-msg').value.trim(),
    portfolio_url:document.getElementById('ap-port').value.trim(),
    status:'pending'
  };
  if(!app.applicant_name){err.textContent='Enter your name.';return;}
  const {error}=await sb.from('crew_applications').upsert(app,{onConflict:'position_id,applicant_user_id'});
  if(error){err.textContent=error.message;return;}
  document.getElementById('cb-apply-overlay').remove();
  const conf=document.createElement('div');
  conf.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px';
  conf.innerHTML=`<div class="cb-auth-box" style="text-align:center"><div style="font-size:2.5rem;margin-bottom:12px">🎉</div><div style="font-weight:700;font-size:1.2rem;margin-bottom:8px">Application submitted!</div><div style="color:var(--muted);font-size:.9rem;margin-bottom:20px">The event director will review your quote for <b>${roleName}</b> and be in touch.</div><button class="btn btn-p" onclick="this.closest('div[style]').remove();renderCrewBoard()">Back to board</button></div>`;
  document.body.appendChild(conf);
}

async function refreshAppCounts(){
  if(!supabaseUser) return;
  const e=E();
  const posIds=e.labour.filter(l=>l.positionId).map(l=>l.positionId);
  if(!posIds.length) return;
  const {data}=await sb.from('crew_applications').select('position_id').in('position_id',posIds);
  if(!data) return;
  const counts={};
  data.forEach(r=>{counts[r.position_id]=(counts[r.position_id]||0)+1;});
  e.labour.forEach(l=>{if(l.positionId) l.appCount=counts[l.positionId]||0;});
}

function showDoc(html){document.getElementById('paper').innerHTML=html;document.getElementById('doc').classList.add('show');}
function closeDoc(){document.getElementById('doc').classList.remove('show');}
function genQuote(){
  const e=E(),q=quoteCalc(),p=e.pricing,ls=labourSubtotal(),vs=e.quote.reduce((s,i)=>s+i.cost*i.qty,0);
  const byCat={};e.quote.forEach(i=>{(byCat[i.cat]=byCat[i.cat]||[]).push(i);});
  const ref='Q-'+e.id.toUpperCase()+'-'+new Date().getFullYear();
  const acc=DB.org.accentColor||'#6d6bff';
  e.status='Quoted';save();
  showDoc(`<div class="paper">
    ${docHeader('QUOTATION',ref)}
    <h2>Prepared for: ${DB.org.client||'Client'}</h2>
    <p><b>${e.name}</b> &nbsp;·&nbsp; ${e.venue} &nbsp;·&nbsp; ${e.dates}</p>
    ${Object.keys(byCat).map(cat=>`<h2>${cat}</h2><table><tr><th>Description</th><th>Vendor</th><th>Qty</th><th style="text-align:right">Amount</th></tr>${byCat[cat].map(i=>`<tr><td>${i.desc}</td><td class="ph">${i.vendor}</td><td>${i.qty}</td><td style="text-align:right">${fmt(i.cost*i.qty)}</td></tr>`).join('')}</table>`).join('')}
    ${e.labour.length?`<h2>Labour & Crew</h2><table><tr><th>Role</th><th>Rate / hr</th><th>Hours</th><th style="text-align:right">Cost</th></tr>${e.labour.map(l=>`<tr><td>${l.name}</td><td>${fmt(l.rate)}</td><td>${l.hours}</td><td style="text-align:right">${fmt(l.rate*l.hours)}</td></tr>`).join('')}</table>`:''}
    ${e.designs.length?`<h2>Designs & Concepts</h2><div class="imgrow">${e.designs.slice(0,4).map(d=>`<div><img src="${d.img}"><div class="ph" style="font-size:11px;margin-top:3px">${d.type}: ${d.label}</div></div>`).join('')}</div>`:''}
    <h2>Investment Summary</h2>
    ${vs?`<div class="pbr"><span>Vendor & production costs</span><span>${fmt(vs)}</span></div>`:''}
    ${ls?`<div class="pbr"><span>Labour & crew</span><span>${fmt(ls)}</span></div>`:''}
    ${(ls+vs)>0?`<div class="pbr" style="border-top:1px solid #eee;padding-top:8px"><span><b>Total cost base</b></span><span><b>${fmt(q.sub)}</b></span></div>`:''}

    <div class="pbr"><span>Management fee (${p.mgmtFeePct}%)</span><span>${fmt(q.mgmt)}</span></div>
    ${q.discount?`<div class="pbr"><span>Discount (${p.discountPct}%)</span><span>-${fmt(q.discount)}</span></div>`:''}
    <div class="pbr"><span>Net (excl. VAT)</span><span>${fmt(q.net)}</span></div>
    <div class="pbr"><span>VAT (${p.vatPct}%)</span><span>${fmt(q.vat)}</span></div>
    <div class="pbr t"><span>Total (incl. VAT)</span><span>${fmt(q.total)}</span></div>
    ${docTerms('quoteTerms')}
  </div>`);
}
function acceptQuote(){
  const e=E(),q=quoteCalc();
  e.status='Contracted';
  if(!e.triple.length){e.quote.forEach(i=>e.triple.push({id:uid(),item:i.desc,scope:i.cost*i.qty,po:i.cost*i.qty,invoice:0}));}
  e.scope=q.net;save();
  const ref='C-'+e.id.toUpperCase()+'-'+new Date().getFullYear();
  showDoc(`<div class="paper">
    ${docHeader('EVENT SERVICES CONTRACT',ref)}
    <h2>Parties</h2>
    <p><b>Service Provider:</b> ${DB.org.name||'Your Company'}</p>
    ${DB.org.address?`<p style="color:#555;font-size:12px;margin-top:-8px">${DB.org.address.replace(/\n/g,', ')}</p>`:''}
    <p><b>Client:</b> ${DB.org.client||'Client'}</p>
    <h2>Scope of Work</h2>
    <p>Delivery of <b>${e.name}</b> at ${e.venue} on ${e.dates}, per accepted quotation, including venue, production, staging, decor, catering, transport and crew as specified.</p>
    <h2>Contract Value</h2>
    <div class="pbr"><span>Net (excl. VAT)</span><span>${fmt(q.net)}</span></div>
    <div class="pbr"><span>VAT (${e.pricing.vatPct}%)</span><span>${fmt(q.vat)}</span></div>
    <div class="pbr t"><span>Total contract value</span><span>${fmt(q.total)}</span></div>
    <h2>Payment Schedule</h2>
    <table><tr><th>Milestone</th><th>%</th><th style="text-align:right">Amount</th></tr>
    ${e.milestones.map(m=>`<tr><td>${m.label}</td><td>${m.pct}%</td><td style="text-align:right">${fmt(q.total*m.pct/100)}</td></tr>`).join('')}</table>
    <h2>Financial Workflow & Audit Trail</h2>
    <p>All vendor purchase orders are issued against this contract value. Each PO and invoice is reconciled via Triple-Match accounting; variances exceeding 5% require Event Director approval and are logged to an immutable audit trail.</p>
    <div class="sig"><div>${DB.org.name||'Service Provider'} · Date</div><div>${DB.org.client||'Client'} · Date</div></div>
    ${docTerms('contractTerms')}
  </div>`);
  setTimeout(()=>renderAdmin(),50);
}

function genInvoice(id){
  const e=E(),q=quoteCalc(),m=e.milestones.find(x=>x.id===id);
  if(m.status==='Pending'){m.status='Invoiced';save();}
  const amt=q.total*m.pct/100,net=amt/(1+(e.pricing.vatPct/100)),vat=amt-net;
  const ref='INV-'+e.id.toUpperCase()+'-'+Date.now().toString(36).toUpperCase();
  showDoc(`<div class="paper">
    ${docHeader('TAX INVOICE',ref)}
    <h2>Bill To</h2>
    <p><b>${DB.org.client||'Client'}</b></p>
    <h2>${m.label} — ${e.name}</h2>
    <table><tr><th>Description</th><th style="text-align:right">Amount (excl. VAT)</th></tr>
    <tr><td>${m.label} — ${m.pct}% of contract value<br><span class="ph">${e.venue} · ${e.dates}</span></td><td style="text-align:right">${fmt(net)}</td></tr></table>
    <div style="margin-top:12px">
      <div class="pbr"><span>Net (excl. VAT)</span><span>${fmt(net)}</span></div>
      <div class="pbr"><span>VAT (${e.pricing.vatPct}%)</span><span>${fmt(vat)}</span></div>
      <div class="pbr t"><span>Amount due</span><span>${fmt(amt)}</span></div>
    </div>
    ${DB.org.banking?`<div style="margin-top:18px;padding:12px 14px;background:#f8f8f8;border-radius:8px;font-size:12px"><b>Banking details:</b><br>${DB.org.banking.replace(/\n/g,'<br>')}</div>`:''}
    ${docTerms('invoiceTerms')}
  </div>`);
  setTimeout(()=>renderAdmin(),50);
}

function genPO(vendor,desc,amount){
  const e=E();
  const ref='PO-'+e.id.toUpperCase()+'-'+Date.now().toString(36).toUpperCase();
  const net=amount,vat=net*(e.pricing.vatPct/100),total=net+vat;
  showDoc(`<div class="paper">
    ${docHeader('PURCHASE ORDER',ref)}
    <h2>Supplier</h2>
    <p><b>${vendor}</b></p>
    <h2>Order Details — ${e.name}</h2>
    <table><tr><th>Description</th><th style="text-align:right">Amount (excl. VAT)</th></tr>
    <tr><td>${desc}<br><span class="ph">${e.venue} · ${e.dates}</span></td><td style="text-align:right">${fmt(net)}</td></tr></table>
    <div style="margin-top:12px">
      <div class="pbr"><span>Net (excl. VAT)</span><span>${fmt(net)}</span></div>
      <div class="pbr"><span>VAT (${e.pricing.vatPct}%)</span><span>${fmt(vat)}</span></div>
      <div class="pbr t"><span>PO value (incl. VAT)</span><span>${fmt(total)}</span></div>
    </div>
    <div style="margin-top:16px;padding:12px 14px;background:#f8f8f8;border-radius:8px;font-size:12px"><b>Issued by:</b> ${DB.org.name||'Your Company'}${DB.org.vatNo?'  ·  VAT: '+DB.org.vatNo:''}</div>
    ${docTerms('poTerms')}
  </div>`);
}

/* ═══ INIT ══════════════════════════════════════════════════ */
function isCrewBoard(){ return window.location.hash==='#crewboard'; }

async function init(){
  if(isCrewBoard()){ renderCrewBoard(); return; }
  const {data:{session:s}} = await sb.auth.getSession();
  if(s){
    supabaseUser = s.user;
    await loadFromCloud();
    await refreshAppCounts();
  }
  sb.auth.onAuthStateChange(async(_e, s)=>{
    if(isCrewBoard()) return;
    const wasLoggedIn = !!supabaseUser;
    supabaseUser = s?.user || null;
    if(supabaseUser && !wasLoggedIn){
      await loadFromCloud();
      await refreshAppCounts();
      render();
    } else if(!supabaseUser){
      session = null;
      render();
    }
  });
  render();
}
window.addEventListener('hashchange',()=>{ if(isCrewBoard()) renderCrewBoard(); else { init(); } });
init();
