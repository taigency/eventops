<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventOps — ERP</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#070912;--bg2:#0c1020;--panel:#10142a;--panel2:#161b36;--line:rgba(255,255,255,.08);--txt:#eef1f8;--muted:#9aa3bd;--accent:#6d6bff;--accent2:#22d3ee;--good:#34d399;--bad:#fb7185;--grad:linear-gradient(120deg,#6d6bff,#22d3ee);}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'Inter',-apple-system,Segoe UI,Roboto,sans-serif;font-size:14px;min-height:100vh}
button{font-family:inherit;cursor:pointer}input,select,textarea{font-family:inherit}
.grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.wrap{max-width:960px;margin:0 auto;padding:24px}
.center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:22px;margin-bottom:16px}
.box{max-width:420px;width:100%}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:1.2rem;margin-bottom:6px}
.brand .m{width:30px;height:30px;border-radius:9px;background:var(--grad);display:grid;place-items:center;font-size:15px;color:#fff;flex-shrink:0}
.ipt{background:var(--bg2);border:1px solid var(--line);color:var(--txt);padding:10px 12px;border-radius:9px;width:100%;font-size:.9rem;margin-bottom:10px}
.ipt:focus{outline:none;border-color:var(--accent)}
label.fl{font-size:.78rem;color:var(--muted);display:block;margin-bottom:5px}
.btn{padding:10px 18px;border-radius:10px;font-weight:600;font-size:.88rem;border:none;transition:.2s;cursor:pointer}
.btn-p{background:var(--grad);color:#fff;width:100%}.btn-p:hover{filter:brightness(1.1)}
.btn-g{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}.btn-g:hover{background:#1d2342}
.btn-sm{padding:6px 12px;font-size:.8rem;border-radius:8px}
.row{display:flex;gap:8px}.row .ipt{margin-bottom:0}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
table{width:100%;border-collapse:collapse;font-size:.88rem}
th{text-align:left;color:var(--muted);font-weight:600;font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;padding:9px 10px;border-bottom:1px solid var(--line)}
td{padding:10px;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums}
tr:last-child td{border-bottom:none}
.ev{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border:1px solid var(--line);border-radius:11px;margin-bottom:8px;cursor:pointer;background:var(--bg2);transition:.15s}
.ev:hover{border-color:var(--accent)}.ev.sel{border-color:var(--accent);box-shadow:inset 3px 0 0 var(--accent)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.72rem;font-weight:600}
.badge-confirmed{background:rgba(52,211,153,.15);color:var(--good)}
.badge-draft{background:rgba(155,163,189,.1);color:var(--muted)}
.x{background:none;border:none;color:var(--bad);font-size:.95rem;cursor:pointer;padding:2px 6px;border-radius:5px}
.x:hover{background:rgba(251,113,133,.1)}
.err{color:var(--bad);font-size:.82rem;margin-bottom:10px;min-height:18px}
.muted{color:var(--muted)}.empty{color:var(--muted);text-align:center;padding:24px}
.br{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line)}.br:last-child{border:none}
.br.tot{border-top:2px solid var(--accent);font-weight:800;font-size:1.1rem;margin-top:6px;padding-top:12px}
.note{font-size:.8rem;color:var(--muted);background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-top:14px}
code{background:var(--bg2);padding:2px 6px;border-radius:5px;font-size:.85em}
.demo-banner{background:linear-gradient(90deg,rgba(109,107,255,.15),rgba(34,211,238,.1));border:1px solid rgba(109,107,255,.3);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:.82rem;display:flex;align-items:center;gap:8px}

/* ── WIZARD ────────────────────────────── */
.wz-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center}
.wz-box{background:var(--panel);border:1px solid var(--line);border-radius:20px;width:520px;max-width:95vw;overflow:hidden}
.wz-header{background:var(--grad);padding:28px 28px 22px;position:relative}
.wz-header h2{color:#fff;font-size:1.4rem;font-weight:800;margin-bottom:4px}
.wz-header p{color:rgba(255,255,255,.8);font-size:.88rem}
.wz-step-dots{display:flex;gap:6px;margin-top:14px}
.wz-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.3);transition:.3s}
.wz-dot.active{background:#fff;width:24px;border-radius:4px}
.wz-body{padding:24px 28px}
.wz-body h3{font-size:1rem;font-weight:700;margin-bottom:8px}
.wz-body p{color:var(--muted);font-size:.88rem;line-height:1.6;margin-bottom:12px}
.wz-feature{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line)}
.wz-feature:last-child{border:none}
.wz-icon{width:36px;height:36px;border-radius:10px;background:var(--bg2);display:grid;place-items:center;font-size:18px;flex-shrink:0}
.wz-footer{padding:16px 28px 24px;display:flex;justify-content:space-between;align-items:center}
.wz-progress{font-size:.78rem;color:var(--muted)}
.wz-btns{display:flex;gap:8px}
.wz-skip{background:none;border:none;color:var(--muted);font-size:.82rem;cursor:pointer}
.wz-skip:hover{color:var(--txt)}

/* ── CHAT ────────────────────────────── */
.chat-btn{position:fixed;bottom:24px;right:24px;width:54px;height:54px;border-radius:50%;background:var(--grad);border:none;color:#fff;font-size:22px;cursor:pointer;box-shadow:0 4px 24px rgba(109,107,255,.4);z-index:900;transition:.2s;display:flex;align-items:center;justify-content:center}
.chat-btn:hover{transform:scale(1.08)}
.chat-panel{position:fixed;bottom:90px;right:24px;width:360px;max-width:calc(100vw - 32px);background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:0 8px 40px rgba(0,0,0,.5);z-index:900;display:flex;flex-direction:column;overflow:hidden;transition:.25s;transform-origin:bottom right}
.chat-panel.hidden{transform:scale(.85);opacity:0;pointer-events:none}
.chat-head{background:var(--grad);padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
.chat-head span{color:#fff;font-weight:700;font-size:.95rem}
.chat-close{background:none;border:none;color:rgba(255,255,255,.8);cursor:pointer;font-size:18px;line-height:1}
.chat-messages{flex:1;height:300px;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:88%;padding:9px 13px;border-radius:14px;font-size:.85rem;line-height:1.5}
.msg.bot{background:var(--panel2);border-bottom-left-radius:4px;align-self:flex-start}
.msg.user{background:var(--accent);color:#fff;border-bottom-right-radius:4px;align-self:flex-end}
.msg.typing span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--muted);animation:blink 1.2s infinite}
.msg.typing span:nth-child(2){animation-delay:.2s}
.msg.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.chat-input-row{padding:10px 12px;border-top:1px solid var(--line);display:flex;gap:8px}
.chat-ipt{flex:1;background:var(--bg2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:8px 12px;font-size:.85rem;resize:none;outline:none}
.chat-send{background:var(--accent);border:none;color:#fff;border-radius:10px;padding:8px 14px;font-size:.85rem;font-weight:600;cursor:pointer}
.chat-send:hover{filter:brightness(1.1)}
.chat-chips{padding:0 12px 10px;display:flex;flex-wrap:wrap;gap:6px}
.chip{background:var(--bg2);border:1px solid var(--line);color:var(--muted);border-radius:20px;padding:4px 10px;font-size:.75rem;cursor:pointer;transition:.15s}
.chip:hover{border-color:var(--accent);color:var(--txt)}
</style>
</head>
<body>
<div id="app"></div>

<!-- ── WIZARD ─────────────────────────── -->
<div class="wz-overlay" id="wizard" style="display:none">
  <div class="wz-box">
    <div class="wz-header">
      <h2 id="wz-title">Welcome to EventOps ⚡</h2>
      <p id="wz-sub">Your all-in-one event quoting & management platform</p>
      <div class="wz-step-dots" id="wz-dots"></div>
    </div>
    <div class="wz-body" id="wz-body"></div>
    <div class="wz-footer">
      <span class="wz-progress" id="wz-prog"></span>
      <div class="wz-btns">
        <button class="wz-skip" onclick="closeWizard()">Skip tour</button>
        <button class="btn btn-p" style="width:auto;padding:8px 22px" id="wz-next" onclick="wzNext()">Next →</button>
      </div>
    </div>
  </div>
</div>

<!-- ── CHAT ──────────────────────────── -->
<button class="chat-btn" onclick="toggleChat()" id="chat-btn" style="display:none" title="EventOps Support">💬</button>
<div class="chat-panel hidden" id="chat-panel">
  <div class="chat-head">
    <span>⚡ EventOps Support</span>
    <button class="chat-close" onclick="toggleChat()">✕</button>
  </div>
  <div class="chat-messages" id="chat-msgs"></div>
  <div class="chat-chips" id="chat-chips"></div>
  <div class="chat-input-row">
    <textarea class="chat-ipt" id="chat-ipt" rows="1" placeholder="Ask anything…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"></textarea>
    <button class="chat-send" onclick="sendChat()">Send</button>
  </div>
</div>

<script>
/* ═══ CONFIG ═══════════════════════════════════════════════════════ */
const SUPABASE_URL = "https://awbtpgugmzitjqovlewr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3YnRwZ3VnbXppdGpxb3ZsZXdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NTkzMDYsImV4cCI6MjA5NzQzNTMwNn0.0SJMcy-B8tfoJHFDVwz4wQPuA03IU5NFWMBKe1_XNn0";
const DEMO_EMAIL = "demo@eventops.app";
const DEMO_PASS  = "Demo1234!";
/* ════════════════════════════════════════════════════════════════════ */

const fmt = n => 'R ' + Math.round(n||0).toLocaleString('en-ZA');
let sb = null, currentEvent = null, events = [], items = [];
function el(){ return document.getElementById('app'); }

/* ─── INIT ────────────────────────────────────────────────────────── */
function init(){
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  sb.auth.getSession().then(({data}) => { data.session ? loadApp() : authScreen(); });
  sb.auth.onAuthStateChange((_e, session) => { session ? loadApp() : authScreen(); });
}

/* ─── AUTH ────────────────────────────────────────────────────────── */
function authScreen(mode='in'){
  hideChatAndSupport();
  el().innerHTML = `<div class="center"><div class="card box">
    <div class="brand"><span class="m">⚡</span>EventOps <span class="grad">ERP</span></div>
    <p class="muted" style="margin-bottom:16px">${mode==='in'?'Sign in to your workspace.':'Create your account.'}</p>
    <div class="err" id="err"></div>
    <label class="fl">Email</label><input class="ipt" id="email" type="email" placeholder="you@company.co.za">
    <label class="fl">Password</label><input class="ipt" id="pass" type="password" placeholder="••••••••">
    <button class="btn btn-p" id="go">${mode==='in'?'Sign in':'Sign up'}</button>
    <div style="margin-top:14px;text-align:center">
      <p class="muted" style="font-size:.85rem;margin-bottom:8px">${mode==='in'?'No account?':'Have an account?'} <a href="#" id="swap" style="color:var(--accent2)">${mode==='in'?'Sign up':'Sign in'}</a></p>
      ${mode==='in'?`<button class="btn btn-g btn-sm" onclick="demoLogin()" style="width:100%;margin-top:4px">🎯 Try Demo (no sign-up needed)</button>`:''}
    </div>
  </div></div>`;
  document.getElementById('swap').onclick = e => { e.preventDefault(); authScreen(mode==='in'?'up':'in'); };
  document.getElementById('go').onclick = async () => {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('pass').value;
    const err = document.getElementById('err'); err.textContent = '';
    try {
      const fn = mode==='in' ? sb.auth.signInWithPassword({email,password}) : sb.auth.signUp({email,password});
      const {error} = await fn; if(error) throw error;
      if(mode==='up') err.textContent = 'Account created! Check your inbox if confirmation is enabled.';
    } catch(e){ err.textContent = e.message || 'Something went wrong.'; }
  };
}

async function demoLogin(){
  const err = document.getElementById('err'); err.textContent = 'Signing in to demo…';
  const {error} = await sb.auth.signInWithPassword({email: DEMO_EMAIL, password: DEMO_PASS});
  if(error) err.textContent = error.message;
}

/* ─── LOAD APP ────────────────────────────────────────────────────── */
async function loadApp(){
  const {data, error} = await sb.from('events').select('*').order('created_at', {ascending:false});
  if(error){
    el().innerHTML = `<div class="wrap"><div class="card"><div class="err">${error.message}</div>
    <p class="muted">Check the Table Editor — did the SQL schema run?</p>
    <button class="btn btn-g btn-sm" style="margin-top:12px" onclick="sb.auth.signOut()">Sign out</button></div></div>`;
    return;
  }
  const {data:{user}} = await sb.auth.getUser();
  const isDemo = user?.email === DEMO_EMAIL;

  events = data || [];
  if(!currentEvent || !events.find(e=>e.id===currentEvent))
    currentEvent = events[0] ? events[0].id : null;
  if(currentEvent) await loadItems(); else items = [];
  renderApp(isDemo);

  // show wizard on first visit
  if(!localStorage.getItem('eo_wizard_done')) showWizard();
  showChatAndSupport();
}

async function loadItems(){
  const {data} = await sb.from('quote_items').select('*').eq('event_id', currentEvent).order('created_at');
  items = data || [];
}

function calc(){
  const e = events.find(x=>x.id===currentEvent);
  if(!e) return {sub:0,total:0};
  const sub = items.reduce((s,i) => s + i.unit_cost*i.qty, 0);
  const margin = sub*(e.margin_pct/100), mgmt = sub*(e.mgmt_fee_pct/100);
  const pre = sub+margin+mgmt, disc = pre*(e.discount_pct/100), net = pre-disc, vat = net*(e.vat_pct/100);
  return {sub,margin,mgmt,disc,net,vat,total:net+vat,e};
}

/* ─── RENDER ──────────────────────────────────────────────────────── */
function renderApp(isDemo){
  const c = calc();
  el().innerHTML = `<div class="wrap">
    <div class="top">
      <div class="brand"><span class="m">⚡</span>EventOps <span class="grad">ERP</span></div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-g btn-sm" onclick="showWizard()">? Tour</button>
        <button class="btn btn-g btn-sm" onclick="sb.auth.signOut()">Sign out</button>
      </div>
    </div>
    ${isDemo ? `<div class="demo-banner">🎯 <span><b>Demo mode</b> — pre-loaded with sample events & line items. Sign up for your own workspace.</span></div>` : ''}
    <div class="card">
      <div class="top" style="margin-bottom:14px"><h3>Events</h3></div>
      <div class="row" style="margin-bottom:14px">
        <input class="ipt" id="ev_name" placeholder="Event name">
        <input class="ipt" id="ev_venue" placeholder="Venue">
        <input class="ipt" id="ev_dates" placeholder="Dates">
        <button class="btn btn-g btn-sm" onclick="addEvent()">+ Add</button>
      </div>
      ${events.length ? events.map(e=>`
        <div class="ev ${e.id===currentEvent?'sel':''}" onclick="selectEvent('${e.id}')">
          <div>
            <b>${e.name}</b>
            ${e.venue ? `<span class="muted"> · ${e.venue}</span>`:''}
            ${e.dates ? `<span class="muted"> · ${e.dates}</span>`:''}
            <span class="badge badge-${(e.status||'Draft').toLowerCase()}" style="margin-left:8px">${e.status||'Draft'}</span>
          </div>
          <button class="x" onclick="event.stopPropagation();delEvent('${e.id}')">✕</button>
        </div>`).join('') : '<div class="empty">No events yet — add one above.</div>'}
    </div>
    ${currentEvent ? `<div class="card">
      <div class="top" style="margin-bottom:6px">
        <h3>Quotation — ${c.e.name}</h3>
        <div style="display:flex;gap:6px">
          <select class="ipt" style="width:auto;margin:0;padding:5px 10px;font-size:.8rem" onchange="updateStatus('${c.e.id}',this.value)">
            ${['Draft','Confirmed','Invoiced','Paid'].map(s=>`<option ${c.e.status===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="row" style="margin-bottom:14px;flex-wrap:wrap">
        <input class="ipt" id="qi_cat" placeholder="Category" style="flex:1;min-width:110px">
        <input class="ipt" id="qi_vendor" placeholder="Vendor" style="flex:1;min-width:110px">
        <input class="ipt" id="qi_desc" placeholder="Description" style="flex:2;min-width:150px">
        <input class="ipt" id="qi_qty" type="number" value="1" style="width:65px">
        <input class="ipt" id="qi_cost" type="number" placeholder="Unit cost" style="width:110px">
        <button class="btn btn-g btn-sm" onclick="addItem()">+ Add line</button>
      </div>
      <table>
        <tr><th>Category</th><th>Vendor</th><th>Description</th><th>Qty</th><th>Unit</th><th>Total</th><th></th></tr>
        ${items.length ? items.map(i=>`
          <tr>
            <td>${i.category||''}</td>
            <td>${i.vendor||''}</td>
            <td>${i.description||''}</td>
            <td>${i.qty}</td>
            <td>${fmt(i.unit_cost)}</td>
            <td><b>${fmt(i.unit_cost*i.qty)}</b></td>
            <td><button class="x" onclick="delItem('${i.id}')">✕</button></td>
          </tr>`).join('') : '<tr><td colspan="7"><div class="empty">No line items yet.</div></td></tr>'}
      </table>
      <div style="max-width:340px;margin-left:auto;margin-top:18px">
        <div class="br"><span class="muted">Subtotal (cost)</span><b>${fmt(c.sub)}</b></div>
        <div class="br"><span class="muted">+ Margin (${c.e.margin_pct}%)</span><b>${fmt(c.margin)}</b></div>
        <div class="br"><span class="muted">+ Mgmt fee (${c.e.mgmt_fee_pct}%)</span><b>${fmt(c.mgmt)}</b></div>
        <div class="br"><span class="muted">− Discount (${c.e.discount_pct}%)</span><b style="color:var(--bad)">-${fmt(c.disc)}</b></div>
        <div class="br"><span class="muted">+ VAT (${c.e.vat_pct}%)</span><b>${fmt(c.vat)}</b></div>
        <div class="br tot"><span>Client total</span><span class="grad">${fmt(c.total)}</span></div>
      </div>
    </div>` : ''}
    <div class="note">✓ Live Supabase data secured by row-level security — your events follow you across devices.</div>
  </div>`;
}

/* ─── EVENT ACTIONS ───────────────────────────────────────────────── */
async function addEvent(){
  const name = document.getElementById('ev_name').value.trim();
  if(!name) return;
  const venue = document.getElementById('ev_venue').value.trim();
  const dates = document.getElementById('ev_dates').value.trim();
  const {error} = await sb.from('events').insert({name,venue,dates});
  if(error) return alert(error.message);
  await loadApp();
}
async function delEvent(id){
  if(!confirm('Delete this event and all its line items?')) return;
  await sb.from('events').delete().eq('id',id);
  if(currentEvent===id) currentEvent = null;
  await loadApp();
}
async function selectEvent(id){ currentEvent=id; await loadItems(); const {data:{user}}=await sb.auth.getUser(); renderApp(user?.email===DEMO_EMAIL); }
async function updateStatus(id,status){ await sb.from('events').update({status}).eq('id',id); events=events.map(e=>e.id===id?{...e,status}:e); const {data:{user}}=await sb.auth.getUser(); renderApp(user?.email===DEMO_EMAIL); }
async function addItem(){
  const category=document.getElementById('qi_cat').value.trim();
  const vendor=document.getElementById('qi_vendor').value.trim();
  const description=document.getElementById('qi_desc').value.trim();
  const qty=+document.getElementById('qi_qty').value||1;
  const unit_cost=+document.getElementById('qi_cost').value||0;
  if(!description&&!vendor) return;
  const {error}=await sb.from('quote_items').insert({event_id:currentEvent,category,vendor,description,qty,unit_cost});
  if(error) return alert(error.message);
  await loadItems(); const {data:{user}}=await sb.auth.getUser(); renderApp(user?.email===DEMO_EMAIL);
}
async function delItem(id){
  await sb.from('quote_items').delete().eq('id',id);
  await loadItems(); const {data:{user}}=await sb.auth.getUser(); renderApp(user?.email===DEMO_EMAIL);
}

/* ─── WIZARD ──────────────────────────────────────────────────────── */
const WZ_STEPS = [
  {
    title:'Welcome to EventOps ⚡',
    sub:'Your all-in-one event quoting & management platform',
    body:`<p>EventOps lets you manage multiple events, build accurate quotations, and track financials — all in one place, secured per-user.</p>
    <div class="wz-feature"><div class="wz-icon">📋</div><div><b>Events panel</b><br><span class="muted" style="font-size:.83rem">Create and switch between multiple events. Each event is completely isolated and private to your account.</span></div></div>
    <div class="wz-feature"><div class="wz-icon">💰</div><div><b>Live quotations</b><br><span class="muted" style="font-size:.83rem">Add line items and watch margin, management fees, discounts and VAT calculate in real-time.</span></div></div>

let wzStep = 0;
function showWizard(){
  wzStep = 0;
  document.getElementById('wizard').style.display = 'flex';
  renderWzStep();
}
function closeWizard(){
  document.getElementById('wizard').style.display = 'none';
  localStorage.setItem('eo_wizard_done','1');
}
function renderWzStep(){
  const s = WZ_STEPS[wzStep];
  document.getElementById('wz-title').textContent = s.title;
  document.getElementById('wz-sub').textContent = s.sub;
  document.getElementById('wz-body').innerHTML = s.body;
  document.getElementById('wz-prog').textContent = `Step ${wzStep+1} of ${WZ_STEPS.length}`;
  document.getElementById('wz-next').textContent = wzStep===WZ_STEPS.length-1 ? 'Get started →' : 'Next →';
  const dots = document.getElementById('wz-dots');
  dots.innerHTML = WZ_STEPS.map((_,i)=>`<div class="wz-dot${i===wzStep?' active':''}"></div>`).join('');
}
function wzNext(){
  if(wzStep < WZ_STEPS.length-1){ wzStep++; renderWzStep(); }
  else closeWizard();
}

const CHIPS = ['Add an event','How does pricing work?','Demo account login','Fix an error','What\'s the total formula?'];

let chatHistory = [];
function showChatAndSupport(){
  document.getElementById('chat-btn').style.display = 'flex';
}
function hideChatAndSupport(){
  document.getElementById('chat-btn').style.display = 'none';
  document.getElementById('chat-panel').classList.add('hidden');
}
function toggleChat(){
  const p = document.getElementById('chat-panel');
  const open = p.classList.toggle('hidden');
  if(!open && chatHistory.length===0) initChat();
}
function initChat(){
  addBotMsg('Hi! 👋 I\'m the EventOps assistant. I can help you use the platform, fix issues, or explain how the quoting works. What do you need?');
  renderChips(CHIPS);
}
function renderChips(chips){
  document.getElementById('chat-chips').innerHTML = chips.map(c=>`<span class="chip" onclick="chipClick('${c}')">${c}</span>`).join('');
}
function chipClick(text){
  document.getElementById('chat-chips').innerHTML = '';
  addUserMsg(text);
  answerChat(text);
}
function addBotMsg(html){
  const m = document.createElement('div');
  m.className='msg bot'; m.innerHTML=html;
  const box = document.getElementById('chat-msgs');
  box.appendChild(m); box.scrollTop=box.scrollHeight;
  chatHistory.push({role:'bot',text:html});
}
function addUserMsg(text){
  const m = document.createElement('div');
  m.className='msg user'; m.textContent=text;
  const box = document.getElementById('chat-msgs');
  box.appendChild(m); box.scrollTop=box.scrollHeight;
  chatHistory.push({role:'user',text});
}
function showTyping(){
  const m = document.createElement('div');
  m.className='msg bot typing'; m.id='typing-ind';
  m.innerHTML='<span></span><span></span><span></span>';
  document.getElementById('chat-msgs').appendChild(m);
  document.getElementById('chat-msgs').scrollTop=99999;
}
function hideTyping(){ const t=document.getElementById('typing-ind'); if(t)t.remove(); }

function answerChat(text){
  showTyping();
  const q = text.toLowerCase();
  let answer = null;
  for(const entry of KB){
    if(entry.k.some(k => q.includes(k))){ answer=entry.a; break; }
  }
  if(!answer){
    answer = `I don't have a specific answer for that yet. Here are a few things that might help:<br><br>
    • Use the <b>? Tour</b> button to re-run the onboarding guide<br>
    • Check Supabase → Table Editor to inspect your data directly<br>
    • Common issues: missing SQL schema, incorrect API keys, or RLS policy errors<br><br>
    Feel free to rephrase your question and I'll do my best to help!`;
  }
  setTimeout(()=>{
    hideTyping();
    addBotMsg(answer);
    renderChips(['How does pricing work?','Fix an error','Supabase setup','Export options']);
  }, 700 + Math.random()*400);
}

function sendChat(){
  const ipt = document.getElementById('chat-ipt');
  const text = ipt.value.trim();
  if(!text) return;
  ipt.value = '';
  document.getElementById('chat-chips').innerHTML = '';
  addUserMsg(text);
  answerChat(text);
}

init();
