<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventOps — Supabase Starter</title>
<!--
==================================================================================
  STEP 1 — RUN THIS SQL IN SUPABASE (SQL Editor → New query → paste → Run)
==================================================================================

-- Profiles: one row per signed-in user (auto-created on signup)
create table public.profiles (
  id uuid primary key references auth.users on delete cascade,
  company text,
  role text default 'planner',
  created_at timestamptz default now()
);

-- Events
create table public.events (
  id uuid primary key default gen_random_uuid(),
  owner_id uuid not null default auth.uid() references auth.users on delete cascade,
  name text not null,
  venue text,
  dates text,
  status text default 'Draft',
  margin_pct numeric default 18,
  mgmt_fee_pct numeric default 8,
  discount_pct numeric default 5,
  vat_pct numeric default 15,
  created_at timestamptz default now()
);

-- Quote line items (belong to an event)
create table public.quote_items (
  id uuid primary key default gen_random_uuid(),
  event_id uuid not null references public.events on delete cascade,
  owner_id uuid not null default auth.uid() references auth.users on delete cascade,
  category text,
  vendor text,
  description text,
  qty numeric default 1,
  unit_cost numeric default 0,
  created_at timestamptz default now()
);

-- Row-Level Security: every user can only touch their own rows
alter table public.profiles    enable row level security;
alter table public.events      enable row level security;
alter table public.quote_items enable row level security;

create policy "own profile"     on public.profiles    for all using (auth.uid() = id)       with check (auth.uid() = id);
create policy "own events"      on public.events      for all using (auth.uid() = owner_id) with check (auth.uid() = owner_id);
create policy "own quote_items" on public.quote_items for all using (auth.uid() = owner_id) with check (auth.uid() = owner_id);

-- Auto-create a profile when a user signs up
create or replace function public.handle_new_user()
returns trigger language plpgsql security definer set search_path = public as $$
begin
  insert into public.profiles (id) values (new.id);
  return new;
end; $$;

create trigger on_auth_user_created
  after insert on auth.users
  for each row execute procedure public.handle_new_user();

==================================================================================
  STEP 2 — paste your Project URL and anon key into CONFIG below, then host this file.
==================================================================================
-->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--bg:#070912;--bg2:#0c1020;--panel:#10142a;--panel2:#161b36;--line:rgba(255,255,255,.08);--txt:#eef1f8;--muted:#9aa3bd;--accent:#6d6bff;--accent2:#22d3ee;--good:#34d399;--bad:#fb7185;--grad:linear-gradient(120deg,#6d6bff,#22d3ee);}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--txt);font-family:'Inter',-apple-system,Segoe UI,Roboto,sans-serif;font-size:14px;min-height:100vh}
  button{font-family:inherit;cursor:pointer}input,select{font-family:inherit}
  .grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .wrap{max-width:900px;margin:0 auto;padding:24px}
  .center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:22px;margin-bottom:16px}
  .box{max-width:400px;width:100%}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:1.2rem;margin-bottom:6px}
  .brand .m{width:30px;height:30px;border-radius:9px;background:var(--grad);display:grid;place-items:center;font-size:15px;color:#fff}
  .ipt{background:var(--bg2);border:1px solid var(--line);color:var(--txt);padding:10px 12px;border-radius:9px;width:100%;font-size:.9rem;margin-bottom:10px}
  label.fl{font-size:.78rem;color:var(--muted);display:block;margin-bottom:5px}
  .btn{padding:10px 18px;border-radius:10px;font-weight:600;font-size:.88rem;border:none;transition:.2s}
  .btn-p{background:var(--grad);color:#fff;width:100%}.btn-p:hover{filter:brightness(1.1)}
  .btn-g{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}.btn-g:hover{background:#1d2342}
  .btn-sm{padding:6px 12px;font-size:.8rem;border-radius:8px}
  .row{display:flex;gap:8px}.row .ipt{margin-bottom:0}
  .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  table{width:100%;border-collapse:collapse;font-size:.88rem}
  th{text-align:left;color:var(--muted);font-weight:600;font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;padding:9px 10px;border-bottom:1px solid var(--line)}
  td{padding:10px;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums}
  tr:last-child td{border-bottom:none}
  .ev{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border:1px solid var(--line);border-radius:11px;margin-bottom:8px;cursor:pointer;background:var(--bg2)}
  .ev:hover{border-color:var(--accent)}.ev.sel{border-color:var(--accent);box-shadow:inset 3px 0 0 var(--accent)}
  .x{background:none;border:none;color:var(--bad);font-size:.95rem;cursor:pointer}
  .err{color:var(--bad);font-size:.82rem;margin-bottom:10px;min-height:18px}
  .muted{color:var(--muted)}.empty{color:var(--muted);text-align:center;padding:24px}
  .br{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line)}.br:last-child{border:none}
  .br.tot{border-top:2px solid var(--accent);font-weight:800;font-size:1.1rem;margin-top:6px;padding-top:12px}
  .seth{font-size:.74rem;text-transform:uppercase;letter-spacing:.06em;color:var(--accent2);margin:16px 0 8px}
  code{background:var(--bg2);padding:2px 6px;border-radius:5px;font-size:.85em}
  .note{font-size:.8rem;color:var(--muted);background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-top:14px}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ===================== CONFIG — paste your values here ===================== */
const SUPABASE_URL = "https://awbtpgugmzitjqovlewr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3YnRwZ3VnbXppdGpxb3ZsZXdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NTkzMDYsImV4cCI6MjA5NzQzNTMwNn0.0SJMcy-B8tfoJHFDVwz4wQPuA03IU5NFWMBKe1_XNn0";
/* =========================================================================== */

const fmt=n=>'R '+Math.round(n||0).toLocaleString('en-ZA');
let sb=null, currentEvent=null, events=[], items=[];

function el(){return document.getElementById('app');}

function init(){
  if(!SUPABASE_URL||!SUPABASE_ANON_KEY||!window.supabase){return setupScreen();}
  sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
  sb.auth.getSession().then(({data})=>{ data.session?loadApp():authScreen(); });
  sb.auth.onAuthStateChange((_e,session)=>{ session?loadApp():authScreen(); });
}

function setupScreen(){
  el().innerHTML=`<div class="center"><div class="card box">
    <div class="brand"><span class="m">⚡</span>EventOps <span class="grad">Supabase</span></div>
    <p class="muted" style="margin-bottom:14px">Not configured yet. Two quick steps:</p>
    <div class="seth">1 · Run the SQL</div><p class="muted">Open the file's source — the SQL schema is in the comment at the top. Paste it into Supabase → SQL Editor → Run.</p>
    <div class="seth">2 · Add your keys</div><p class="muted">Edit the <code>CONFIG</code> at the top of the script: paste your <code>SUPABASE_URL</code> and <code>SUPABASE_ANON_KEY</code> from Project Settings → API.</p>
    <div class="note">${!window.supabase?'⚠ The Supabase library didn\'t load. This happens in preview panes that block external scripts — host the file or open it in your browser and it will work.':'Once your keys are in, reload this page to sign in.'}</div>
  </div></div>`;
}

function authScreen(mode='in'){
  el().innerHTML=`<div class="center"><div class="card box">
    <div class="brand"><span class="m">⚡</span>EventOps <span class="grad">ERP</span></div>
    <p class="muted" style="margin-bottom:16px">${mode==='in'?'Sign in to your workspace.':'Create your account.'}</p>
    <div class="err" id="err"></div>
    <label class="fl">Email</label><input class="ipt" id="email" type="email" placeholder="you@company.co.za">
    <label class="fl">Password</label><input class="ipt" id="pass" type="password" placeholder="••••••••">
    <button class="btn btn-p" id="go">${mode==='in'?'Sign in':'Sign up'}</button>
    <p class="muted" style="margin-top:14px;font-size:.85rem;text-align:center">${mode==='in'?'No account?':'Have an account?'} <a href="#" id="swap" style="color:var(--accent2)">${mode==='in'?'Sign up':'Sign in'}</a></p>
  </div></div>`;
  document.getElementById('swap').onclick=e=>{e.preventDefault();authScreen(mode==='in'?'up':'in');};
  document.getElementById('go').onclick=async()=>{
    const email=document.getElementById('email').value.trim(),password=document.getElementById('pass').value;
    const err=document.getElementById('err');err.textContent='';
    try{
      const fn=mode==='in'?sb.auth.signInWithPassword({email,password}):sb.auth.signUp({email,password});
      const {error}=await fn; if(error)throw error;
      if(mode==='up')err.textContent='Account created. If email confirmation is on, check your inbox — otherwise you\'re in.';
    }catch(e){err.textContent=e.message||'Something went wrong.';}
  };
}

async function loadApp(){
  const {data,error}=await sb.from('events').select('*').order('created_at',{ascending:false});
  if(error){el().innerHTML=`<div class="wrap"><div class="card"><div class="err">${error.message}</div><p class="muted">Did the SQL run successfully? Check the Table Editor for the events table.</p><button class="btn btn-g btn-sm" onclick="sb.auth.signOut()">Sign out</button></div></div>`;return;}
  events=data||[]; if(!currentEvent||!events.find(e=>e.id===currentEvent))currentEvent=events[0]?events[0].id:null;
  if(currentEvent)await loadItems();else items=[];
  renderApp();
}
async function loadItems(){const {data}=await sb.from('quote_items').select('*').eq('event_id',currentEvent).order('created_at');items=data||[];}

function calc(){const e=events.find(x=>x.id===currentEvent);if(!e)return{sub:0,total:0};const sub=items.reduce((s,i)=>s+i.unit_cost*i.qty,0);const margin=sub*(e.margin_pct/100),mgmt=sub*(e.mgmt_fee_pct/100);const pre=sub+margin+mgmt,disc=pre*(e.discount_pct/100),net=pre-disc,vat=net*(e.vat_pct/100);return{sub,margin,mgmt,disc,net,vat,total:net+vat,e};}

function renderApp(){
  const c=calc();
  el().innerHTML=`<div class="wrap">
    <div class="top"><div class="brand"><span class="m">⚡</span>EventOps <span class="grad">ERP</span></div><button class="btn btn-g btn-sm" onclick="sb.auth.signOut()">Sign out</button></div>
    <div class="card">
      <div class="top" style="margin-bottom:14px"><h3>Events</h3></div>
      <div class="row" style="margin-bottom:14px"><input class="ipt" id="ev_name" placeholder="Event name"><input class="ipt" id="ev_venue" placeholder="Venue"><input class="ipt" id="ev_dates" placeholder="Dates"><button class="btn btn-g btn-sm" onclick="addEvent()">+ Add</button></div>
      ${events.length?events.map(e=>`<div class="ev ${e.id===currentEvent?'sel':''}" onclick="selectEvent('${e.id}')"><div><b>${e.name}</b> <span class="muted">${e.venue||''} ${e.dates||''}</span></div><button class="x" onclick="event.stopPropagation();delEvent('${e.id}')">✕</button></div>`).join(''):'<div class="empty">No events yet — add one above.</div>'}
    </div>
    ${currentEvent?`<div class="card">
      <div class="top" style="margin-bottom:6px"><h3>Quotation — ${c.e.name}</h3></div>
      <div class="row" style="margin-bottom:14px;flex-wrap:wrap">
        <input class="ipt" id="qi_cat" placeholder="Category" style="flex:1;min-width:120px">
        <input class="ipt" id="qi_vendor" placeholder="Vendor" style="flex:1;min-width:120px">
        <input class="ipt" id="qi_desc" placeholder="Description" style="flex:2;min-width:160px">
        <input class="ipt" id="qi_qty" type="number" value="1" style="width:70px">
        <input class="ipt" id="qi_cost" type="number" placeholder="Unit cost" style="width:120px">
        <button class="btn btn-g btn-sm" onclick="addItem()">+ Add</button>
      </div>
      <table><tr><th>Category</th><th>Vendor</th><th>Description</th><th>Qty</th><th>Unit</th><th>Total</th><th></th></tr>
      ${items.length?items.map(i=>`<tr><td>${i.category||''}</td><td>${i.vendor||''}</td><td>${i.description||''}</td><td>${i.qty}</td><td>${fmt(i.unit_cost)}</td><td>${fmt(i.unit_cost*i.qty)}</td><td><button class="x" onclick="delItem('${i.id}')">✕</button></td></tr>`).join(''):'<tr><td colspan="7"><div class="empty">No line items yet.</div></td></tr>'}
      </table>
      <div style="max-width:340px;margin-left:auto;margin-top:16px">
        <div class="br"><span>Subtotal</span><b>${fmt(c.sub)}</b></div>
        <div class="br"><span>+ Margin (${c.e.margin_pct}%)</span><b>${fmt(c.margin)}</b></div>
        <div class="br"><span>+ Mgmt fee (${c.e.mgmt_fee_pct}%)</span><b>${fmt(c.mgmt)}</b></div>
        <div class="br"><span>− Discount (${c.e.discount_pct}%)</span><b>-${fmt(c.disc)}</b></div>
        <div class="br"><span>+ VAT (${c.e.vat_pct}%)</span><b>${fmt(c.vat)}</b></div>
        <div class="br tot"><span>Client total</span><span class="grad">${fmt(c.total)}</span></div>
      </div>
    </div>`:''}
    <div class="note">✓ This is live Supabase data, secured by row-level security — sign in on another device or browser and your events follow you. This is the working foundation; the full ERP modules layer on from here.</div>
  </div>`;
}

async function addEvent(){const name=document.getElementById('ev_name').value.trim();if(!name)return;const venue=document.getElementById('ev_venue').value.trim(),dates=document.getElementById('ev_dates').value.trim();const {error}=await sb.from('events').insert({name,venue,dates});if(error)return alert(error.message);await loadApp();}
async function delEvent(id){if(!confirm('Delete this event and its line items?'))return;await sb.from('events').delete().eq('id',id);if(currentEvent===id)currentEvent=null;await loadApp();}
async function selectEvent(id){currentEvent=id;await loadItems();renderApp();}
async function addItem(){const category=document.getElementById('qi_cat').value.trim(),vendor=document.getElementById('qi_vendor').value.trim(),description=document.getElementById('qi_desc').value.trim(),qty=+document.getElementById('qi_qty').value||1,unit_cost=+document.getElementById('qi_cost').value||0;if(!description&&!vendor)return;const {error}=await sb.from('quote_items').insert({event_id:currentEvent,category,vendor,description,qty,unit_cost});if(error)return alert(error.message);await loadItems();renderApp();}
async function delItem(id){await sb.from('quote_items').delete().eq('id',id);await loadItems();renderApp();}

init();
</script>
</body>
</html>
