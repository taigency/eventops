<!DOCTYPE html>
<html lang="en" data-v="2">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EventOps — Master Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#06080F;--bg2:#090C18;--panel:#0F1323;--panel2:#141929;
  --line:rgba(148,163,184,.1);--txt:#DDE3F0;--muted:#7B8BAD;
  --accent:#5462F0;--accent2:#0BB5CC;--good:#22C55E;--warn:#F59E0B;--bad:#F43F5E;
  --grad:linear-gradient(135deg,#5462F0 0%,#8B5CF6 52%,#0BB5CC 100%);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--txt);font-family:'Plus Jakarta Sans',-apple-system,sans-serif;font-size:14px;line-height:1.6}
button{font-family:inherit;cursor:pointer}input,select,textarea{font-family:inherit}
.grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-weight:700}
a{color:var(--accent2);text-decoration:none}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.auth-box{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:36px;width:100%;max-width:380px}
.auth-logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1.1rem;margin-bottom:6px}
.auth-logo .m{width:34px;height:34px;border-radius:10px;background:var(--grad);display:grid;place-items:center;font-size:16px}
.auth-sub{color:var(--muted);font-size:.83rem;margin-bottom:24px}
.auth-err{color:var(--bad);font-size:.82rem;min-height:18px;margin-bottom:6px}
.fl{display:block;font-size:.78rem;color:var(--muted);margin-bottom:4px;font-weight:500}
.ipt{background:var(--bg);border:1px solid var(--line);color:var(--txt);border-radius:9px;padding:10px 13px;width:100%;font-size:.88rem;font-family:inherit;transition:.15s;margin-bottom:12px}
.ipt:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(84,98,240,.15)}
.btn{padding:9px 18px;border-radius:9px;font-weight:600;font-size:.85rem;border:none;cursor:pointer;transition:.18s;font-family:inherit}
.btn-p{background:var(--grad);color:#fff;box-shadow:0 2px 12px rgba(84,98,240,.3)}.btn-p:hover{filter:brightness(1.08)}
.btn-g{background:var(--panel);color:var(--txt);border:1px solid var(--line)}.btn-g:hover{border-color:rgba(148,163,184,.3)}
.btn-red{background:rgba(244,63,94,.15);color:var(--bad);border:1px solid rgba(244,63,94,.3)}.btn-red:hover{background:rgba(244,63,94,.25)}
.btn-warn{background:rgba(245,158,11,.12);color:var(--warn);border:1px solid rgba(245,158,11,.3)}
.btn-sm{padding:6px 12px;font-size:.8rem}
.btn-xs{padding:4px 10px;font-size:.75rem;border-radius:7px}

/* LAYOUT */
#admin{display:flex;min-height:100vh}
.side{width:224px;background:var(--bg2);border-right:1px solid var(--line);padding:18px 12px;display:flex;flex-direction:column;flex-shrink:0}
.brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:.95rem;padding:4px 8px 18px;letter-spacing:-.01em}
.brand .m{width:28px;height:28px;border-radius:8px;background:var(--grad);display:grid;place-items:center;font-size:13px}
.nav-i{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:9px;color:var(--muted);font-weight:500;margin-bottom:1px;cursor:pointer;transition:.15s;font-size:.83rem}
.nav-i:hover{background:var(--panel);color:var(--txt)}
.nav-i.active{background:var(--panel);color:var(--txt);box-shadow:inset 3px 0 0 var(--accent)}
.nav-i .ic{width:18px;text-align:center;flex-shrink:0}
.nav-sep{height:1px;background:var(--line);margin:8px 0}
.side-foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--line);font-size:.72rem;color:var(--muted)}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 22px;border-bottom:1px solid var(--line);background:rgba(9,12,24,.8);backdrop-filter:blur(14px);position:sticky;top:0;z-index:20;flex-shrink:0}
.topbar h1{font-size:1rem;font-weight:700;letter-spacing:-.01em}
.content{padding:24px;overflow-y:auto;flex:1}

/* CARDS */
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:16px}
.sec-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.sec-h h3{font-size:.9rem;font-weight:700}
.grid{display:grid;gap:14px}
.g4{grid-template-columns:repeat(4,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:1fr 1fr}
@media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.g3{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}}
.kpi{text-align:center;padding:18px 12px}
.kpi .lbl{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;font-weight:600}
.kpi .v{font-size:1.7rem;font-weight:700;letter-spacing:-.02em;line-height:1}
.kpi .d{font-size:.72rem;color:var(--muted);margin-top:4px}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{text-align:left;padding:8px 12px;font-size:.68rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);border-bottom:1px solid var(--line);font-weight:600;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.015);cursor:pointer}
.actions-td{display:flex;gap:5px;flex-wrap:wrap}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:100px;font-size:.7rem;font-weight:600;white-space:nowrap}
.b-green{background:rgba(34,197,94,.12);color:#4ade80}
.b-blue{background:rgba(84,98,240,.15);color:#818cf8}
.b-amber{background:rgba(245,158,11,.12);color:#fbbf24}
.b-red{background:rgba(244,63,94,.12);color:#fb7185}
.b-gray{background:rgba(148,163,184,.08);color:var(--muted)}
.b-cyan{background:rgba(11,181,204,.12);color:var(--accent2)}
.b-purple{background:rgba(139,92,246,.12);color:#a78bfa}

/* PLAN BADGES */
.plan-beta{background:rgba(148,163,184,.1);color:var(--muted)}
.plan-starter{background:rgba(34,197,94,.12);color:#4ade80}
.plan-growth{background:rgba(11,181,204,.12);color:var(--accent2)}
.plan-pro{background:rgba(139,92,246,.12);color:#a78bfa}
.plan-agency{background:rgba(245,158,11,.12);color:var(--warn)}

/* STATUS */
.status-active{color:var(--good)}
.status-blocked{color:var(--bad)}
.status-suspended{color:var(--warn)}

/* SEARCH */
.search-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.search-ipt{background:var(--bg2);border:1px solid var(--line);color:var(--txt);border-radius:9px;padding:8px 13px;font-size:.85rem;font-family:inherit;flex:1;min-width:180px}
.search-ipt:focus{outline:none;border-color:var(--accent)}
.filter-sel{background:var(--bg2);border:1px solid var(--line);color:var(--txt);border-radius:9px;padding:8px 12px;font-size:.83rem;font-family:inherit}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.modal-bg.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:28px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:1rem;font-weight:700;margin-bottom:16px}
.modal-acts{display:flex;gap:8px;margin-top:20px;justify-content:flex-end;flex-wrap:wrap}

/* FEEDBACK */
.fb-item{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;background:var(--panel2);transition:.15s}
.fb-item.unread{border-color:rgba(84,98,240,.3);background:rgba(84,98,240,.04)}
.fb-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.fb-msg{font-size:.85rem;line-height:1.6;margin-bottom:8px}
.fb-ai{background:rgba(11,181,204,.08);border:1px solid rgba(11,181,204,.2);border-radius:8px;padding:8px 12px;font-size:.8rem;color:var(--accent2);margin-bottom:8px}
.fb-ai .ai-lbl{font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;opacity:.7;margin-bottom:2px;font-weight:600}
.fb-reply-box{display:none;margin-top:10px}.fb-reply-box.open{display:block}

/* MISC */
.act-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:.82rem}
.act-item:last-child{border:none}
.act-ic{font-size:1rem;flex-shrink:0;margin-top:1px}
.act-time{font-size:.72rem;color:var(--muted);flex-shrink:0;white-space:nowrap}
.usage-bar-wrap{margin-bottom:12px}
.usage-bar-label{display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:4px;color:var(--muted)}
.usage-bar{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.usage-bar-fill{height:100%;border-radius:3px;background:var(--grad);transition:.4s}
.tabs{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:4px;margin-bottom:18px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:7px;font-size:.82rem;font-weight:600;color:var(--muted);cursor:pointer;transition:.15s}
.tab.on{background:var(--panel);color:var(--txt)}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted);font-size:.85rem}
.note-box{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px;font-size:.82rem;color:var(--muted);font-style:italic;margin-top:8px}
#toast{position:fixed;bottom:20px;right:20px;background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:10px 18px;border-radius:10px;font-size:.85rem;transform:translateY(60px);transition:.25s;opacity:0;z-index:999}
#toast.show{transform:translateY(0);opacity:1}
.av{width:36px;height:36px;border-radius:50%;background:var(--grad);display:grid;place-items:center;font-size:.75rem;font-weight:700;flex-shrink:0;color:#fff}
.co-av{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-size:.88rem;font-weight:700;color:#fff;flex-shrink:0}
.detail-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:.83rem}
.detail-row:last-child{border:none}
.detail-label{color:var(--muted);font-size:.78rem}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen" class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo"><div class="m">⚡</div>EventOps <span class="grad">Console</span></div>
    <div class="auth-sub">System master access only.</div>
    <div class="auth-err" id="auth-err"></div>
    <label class="fl">Email</label>
    <input class="ipt" id="a-email" type="email" placeholder="tiaanj@gmail.com">
    <label class="fl">Password</label>
    <input class="ipt" id="a-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAdminAuth()">
    <button class="btn btn-p" style="width:100%;padding:11px" onclick="doAdminAuth()">Sign in to Console →</button>
  </div>
</div>

<!-- CONSOLE -->
<div id="admin" style="display:none">
  <div class="side">
    <div class="brand"><div class="m">⚡</div>Admin <span class="grad">Console</span></div>
    <div class="nav-i active" id="nav-overview"     onclick="showPage('overview')">  <span class="ic">📊</span>Overview</div>
    <div class="nav-i"        id="nav-companies"    onclick="showPage('companies')"> <span class="ic">🏢</span>Companies <span id="co-count" style="margin-left:auto;font-size:.7rem;background:var(--bg);padding:1px 7px;border-radius:20px"></span></div>
    <div class="nav-i"        id="nav-subscriptions" onclick="showPage('subscriptions')"><span class="ic">💳</span>Subscriptions</div>
    <div class="nav-sep"></div>
    <div class="nav-i"        id="nav-feedback"     onclick="showPage('feedback')">  <span class="ic">💬</span>Feedback <span id="fb-badge" style="display:none;background:var(--bad);color:#fff;border-radius:100px;padding:1px 7px;font-size:.65rem;margin-left:auto"></span></div>
    <div class="nav-i"        id="nav-messages"     onclick="showPage('messages')">  <span class="ic">✉️</span>Message Users</div>
    <div class="nav-i"        id="nav-activity"     onclick="showPage('activity')">  <span class="ic">📡</span>Activity Log</div>
    <div class="nav-sep"></div>
    <div class="nav-i"        id="nav-usage"        onclick="showPage('usage')">     <span class="ic">📈</span>Usage & Analytics</div>
    <div class="side-foot">
      <div id="admin-email" style="margin-bottom:6px;font-size:.75rem"></div>
      <button class="btn btn-g btn-sm" onclick="doSignOut()" style="width:100%">⏻ Sign out</button>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <h1 id="page-title">Overview</h1>
      <div style="display:flex;gap:8px;align-items:center">
        <span style="font-size:.75rem;color:var(--muted)" id="last-refresh"></span>
        <button class="btn btn-g btn-sm" onclick="refreshAll()">⟳ Refresh</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- COMPANY DETAIL MODAL -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL     = 'https://awbtpgugmzitjqovlewr.supabase.co';
const SUPABASE_ANON_KEY= 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3YnRwZ3VnbXppdGpxb3ZsZXdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NTkzMDYsImV4cCI6MjA5NzQzNTMwNn0.0SJMcy-B8tfoJHFDVwz4wQPuA03IU5NFWMBKe1_XNn0';
const ADMIN_EMAIL      = 'tiaanj@gmail.com';
const PLANS = ['beta','starter','growth','pro','agency'];
const PLAN_PRICES = {beta:0,starter:250,growth:750,pro:1500,agency:0};
const PLAN_LABELS = {beta:'Beta (free)',starter:'Starter — R250/mo',growth:'Growth — R750/mo',pro:'Pro — R1 500/mo',agency:'Agency — custom'};

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let adminUser = null, currentPage = 'overview';
let allCompanies = [], allUserData = [], allFeedback = [], allActivity = [];

/* ═══ AUTH ══════════════════════════════════════════ */
async function doAdminAuth(){
  const email = document.getElementById('a-email').value.trim();
  const pass  = document.getElementById('a-pass').value;
  const err   = document.getElementById('auth-err');
  err.textContent = '';
  if(email !== ADMIN_EMAIL){ err.textContent='Access denied.'; return; }
  const {data,error} = await sb.auth.signInWithPassword({email,password:pass});
  if(error){ err.textContent=error.message; return; }
  adminUser = data.user;
  enterConsole();
}

async function doSignOut(){ await sb.auth.signOut(); location.reload(); }

async function checkSession(){
  const {data:{session}} = await sb.auth.getSession();
  if(session && session.user.email===ADMIN_EMAIL){ adminUser=session.user; enterConsole(); }
}

function enterConsole(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('admin').style.display='flex';
  document.getElementById('admin-email').textContent=adminUser.email;
  refreshAll();
}

/* ═══ DATA ══════════════════════════════════════════ */
async function refreshAll(){
  document.getElementById('last-refresh').textContent='Loading…';
  await Promise.all([loadCompanies(), loadFeedback(), loadActivity()]);
  document.getElementById('last-refresh').textContent='Updated '+new Date().toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'});
  const co = document.getElementById('co-count');
  if(co) co.textContent = allCompanies.length;
  showPage(currentPage);
}

async function loadCompanies(){
  try{
    const [accRes, udRes] = await Promise.all([
      sb.from('company_accounts').select('*').order('registered_at',{ascending:false}),
      sb.from('user_data').select('user_id,updated_at,data'),
    ]);
    allUserData = udRes.data || [];
    const udMap = {};
    allUserData.forEach(r=>{ udMap[r.user_id]={updatedAt:r.updated_at,data:r.data}; });
    allCompanies = (accRes.data||[]).map(a=>{
      const ud = udMap[a.user_id] || {};
      const events = Object.values(ud.data?.events||{});
      return {
        ...a,
        updatedAt: a.last_active || ud.updatedAt,
        events,
        team: ud.data?.team||[],
        orgData: ud.data?.org||{},
        onboardingDone: ud.data?.onboardingDone||false,
      };
    });
    // Users with user_data but no company_accounts row yet
    allUserData.forEach(r=>{
      if(!allCompanies.find(c=>c.user_id===r.user_id)){
        allCompanies.push({
          user_id:r.user_id,
          email:r.data?.org?.email||'',
          company_name:r.data?.org?.name||'Unknown',
          owner_name:r.data?.org?.ownerName||'',
          plan:'beta',status:'active',monthly_fee:0,
          event_count:Object.keys(r.data?.events||{}).length,
          team_size:(r.data?.team||[]).length,
          updatedAt:r.updated_at,
          events:Object.values(r.data?.events||{}),
          team:r.data?.team||[],
          orgData:r.data?.org||{},
          onboardingDone:r.data?.onboardingDone||false,
          registered_at:r.updated_at,
        });
      }
    });
  }catch(e){ allCompanies=[]; }
}

async function loadFeedback(){
  try{
    const {data} = await sb.from('user_feedback').select('*').order('created_at',{ascending:false}).limit(200);
    allFeedback = data||[];
    const unread = allFeedback.filter(f=>!f.read_by_admin).length;
    const badge  = document.getElementById('fb-badge');
    badge.textContent=unread; badge.style.display=unread?'inline':'none';
  }catch(e){ allFeedback=[]; }
}

async function loadActivity(){
  try{
    const {data} = await sb.from('admin_activity').select('*').order('created_at',{ascending:false}).limit(100);
    allActivity = data||[];
  }catch(e){ allActivity=[]; }
}

/* ═══ NAV ═══════════════════════════════════════════ */
const PAGE_TITLES={overview:'Overview',companies:'Companies & Users',subscriptions:'Subscription Management',feedback:'Feedback Inbox',messages:'Message Users',activity:'Activity Log',usage:'Usage & Analytics'};

function showPage(p){
  currentPage=p;
  document.querySelectorAll('.nav-i').forEach(el=>el.classList.remove('active'));
  document.getElementById('nav-'+p)?.classList.add('active');
  document.getElementById('page-title').textContent=PAGE_TITLES[p]||p;
  ({overview:renderOverview,companies:renderCompanies,subscriptions:renderSubscriptions,feedback:renderFeedback,messages:renderMessages,activity:renderActivity,usage:renderUsage}[p])();
}

/* ═══ OVERVIEW ══════════════════════════════════════ */
function renderOverview(){
  const active   = allCompanies.filter(c=>c.status==='active').length;
  const blocked  = allCompanies.filter(c=>c.status==='blocked').length;
  const totalEvt = allCompanies.reduce((s,c)=>s+(c.events?.length||0),0);
  const mrr      = allCompanies.filter(c=>c.status==='active').reduce((s,c)=>s+(c.monthly_fee||0),0);
  const unread   = allFeedback.filter(f=>!f.read_by_admin).length;
  const urgent   = allFeedback.filter(f=>f.priority==='urgent'&&!f.read_by_admin).length;
  const thisWeek = allCompanies.filter(c=>c.registered_at&&(Date.now()-new Date(c.registered_at))<7*864e5).length;

  document.getElementById('content').innerHTML=`
    <div class="grid g4" style="margin-bottom:16px">
      <div class="card kpi"><div class="lbl">Total Companies</div><div class="v">${allCompanies.length}</div><div class="d">${thisWeek} this week</div></div>
      <div class="card kpi"><div class="lbl">Active Accounts</div><div class="v" style="color:var(--good)">${active}</div><div class="d">${blocked} blocked</div></div>
      <div class="card kpi"><div class="lbl">Total Events</div><div class="v">${totalEvt}</div><div class="d">across all companies</div></div>
      <div class="card kpi"><div class="lbl">Monthly Revenue</div><div class="v ${mrr?'grad':''}">R${mrr.toLocaleString('en-ZA')}</div><div class="d">MRR</div></div>
    </div>
    <div class="grid g4" style="margin-bottom:16px">
      ${PLANS.map(p=>{const n=allCompanies.filter(c=>c.plan===p).length;return`<div class="card kpi"><div class="lbl">${p.charAt(0).toUpperCase()+p.slice(1)}</div><div class="v">${n}</div><div class="d">companies</div></div>`;}).join('')}
    </div>
    ${urgent?`<div style="background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.25);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <span style="font-size:1.3rem">🚨</span>
      <div><div style="font-weight:600;color:var(--bad)">${urgent} urgent feedback item${urgent>1?'s':''} need attention</div><div style="font-size:.8rem;color:var(--muted);margin-top:2px">Users may be experiencing critical issues.</div></div>
      <button class="btn btn-sm btn-red" style="margin-left:auto" onclick="showPage('feedback')">Review now →</button>
    </div>`:''}

/* ═══ BLOCK / UNBLOCK / DELETE ══════════════════════ */
function openBlockModal(userId, name){
  document.getElementById('modal').innerHTML=`
    <h2>🚫 Block account — ${esc(name)}</h2>
    <p style="color:var(--muted);font-size:.85rem;margin-bottom:16px">The user will be immediately signed out and unable to sign in. You can unblock them at any time.</p>
    <label class="fl">Reason (shown to user)</label>
    <textarea class="ipt" id="block-reason" rows="3" placeholder="e.g. Payment overdue · Account suspended pending review…"></textarea>
    <div class="modal-acts">
      <button class="btn btn-g" onclick="closeModal()">Cancel</button>
      <button class="btn btn-red" onclick="doBlock('${userId}','${esc(name)}')">Confirm block</button>
    </div>`;
  document.getElementById('modal-bg').classList.add('show');
}

function openDeleteModal(userId, name){
  document.getElementById('modal').innerHTML=`
    <h2>🗑 Delete account — ${esc(name)}</h2>
    <div style="background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.25);border-radius:10px;padding:14px;margin-bottom:16px;font-size:.85rem;color:var(--bad)">
      ⚠ This permanently deletes the user's Supabase auth account, all their data, and cannot be undone.
    </div>
    <div class="modal-acts">
      <button class="btn btn-g" onclick="closeModal()">Cancel</button>
      <button class="btn btn-red" onclick="doDelete('${userId}','${esc(name)}')">Permanently delete</button>
    </div>`;
  document.getElementById('modal-bg').classList.add('show');
}

async function adminAction(body){
  const {data:{session}} = await sb.auth.getSession();
  const res = await fetch('/api/admin-action', {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},
    body:JSON.stringify(body),
  });
  return res.json();
}

async function doBlock(userId, name){
  const reason = document.getElementById('block-reason')?.value.trim()||'Account suspended by admin.';
  closeModal();
  toast('Blocking '+name+'…');
  const r = await adminAction({action:'block',userId,reason});
  if(r.ok){ toast(name+' blocked.'); await refreshAll(); }
  else toast('Error: '+(r.error||'unknown'));
}

async function doUnblock(userId, name){
  if(!confirm('Unblock '+name+'?')) return;
  toast('Unblocking…');
  const r = await adminAction({action:'unblock',userId});
  if(r.ok){ toast(name+' unblocked.'); await refreshAll(); }
  else toast('Error: '+(r.error||'unknown'));
}

async function doDelete(userId, name){
  closeModal();
  toast('Deleting '+name+'…');
  const r = await adminAction({action:'delete',userId});
  if(r.ok){ toast(name+' deleted.'); await refreshAll(); }
  else toast('Error: '+(r.error||'unknown'));
}

async function savePlan(userId){
  const plan = document.getElementById('det-plan').value;
  const fee  = parseFloat(document.getElementById('det-fee').value)||0;
  const r = await adminAction({action:'set_plan',userId,plan,fee});
  if(r.ok){
    const c=allCompanies.find(x=>x.user_id===userId);
    if(c){c.plan=plan;c.monthly_fee=fee;}
    toast('Plan updated ✓');
  } else toast('Error: '+(r.error||'unknown'));
}

async function saveNotes(userId){
  const notes = document.getElementById('det-notes').value.trim();
  const r = await adminAction({action:'set_notes',userId,notes});
  if(r.ok){
    const c=allCompanies.find(x=>x.user_id===userId);
    if(c) c.notes=notes;
    toast('Notes saved ✓');
  } else toast('Error: '+(r.error||'unknown'));
}

let _fbFilter='all';
function renderFeedback(){
  const filters=['all','unread','urgent','feature_request','bug','question','praise','complaint'];
  const filtered=allFeedback.filter(f=>{
    if(_fbFilter==='all') return true;
    if(_fbFilter==='unread') return !f.read_by_admin;
    if(_fbFilter==='urgent') return f.priority==='urgent';
    return f.category===_fbFilter;

  document.getElementById('content').innerHTML=`
    <div class="tabs">${filters.map(f=>`<div class="tab ${_fbFilter===f?'on':''}" onclick="_fbFilter='${f}';renderFeedback()">${f.replace('_',' ')} ${f==='unread'?'('+allFeedback.filter(x=>!x.read_by_admin).length+')':''}</div>`).join('')}</div>
    <div id="fb-list">${filtered.length?filtered.map(renderFbItem).join(''):`<div class="empty-state">No feedback in this category.</div>`}</div>`;
}

      ${f.company_name?`<span style="font-size:.75rem;color:var(--muted)">· ${esc(f.company_name)}</span>`:''}
      <span style="margin-left:auto;font-size:.72rem;color:var(--muted)">${timeAgo(f.created_at)}</span>
    </div>
    <div class="fb-msg">"${esc(f.message||'')}"</div>
    ${f.ai_summary?`<div class="fb-ai"><div class="ai-lbl">AI summary</div>${esc(f.ai_summary)}</div>`:''}
    ${f.suggested_reply?`<div class="fb-ai" style="border-color:rgba(84,98,240,.2);color:var(--accent)"><div class="ai-lbl">Suggested reply</div>${esc(f.suggested_reply)}</div>`:''}
    ${f.admin_reply?`<div style="background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.2);border-radius:8px;padding:8px 12px;font-size:.8rem;margin-bottom:8px"><b style="color:var(--good)">✓ Reply sent:</b> ${esc(f.admin_reply)}</div>`:''}
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${!f.read_by_admin?`<button class="btn btn-g btn-xs" onclick="markRead('${f.id}')">✓ Mark read</button>`:''}
      <button class="btn btn-g btn-xs" onclick="toggleReply('${f.id}')">↩ Reply</button>
      ${f.user_email?`<button class="btn btn-g btn-xs" onclick="composeToUser('','','${esc(f.user_email)}')">✉ Message</button>`:''}
    </div>
    <div class="fb-reply-box" id="reply-${f.id}">
      <textarea class="ipt" id="reply-txt-${f.id}" rows="3" placeholder="Reply to ${f.user_email||'user'}…" style="margin-top:10px;margin-bottom:6px">${esc(f.suggested_reply||'')}</textarea>
      <div style="display:flex;gap:6px">
        <button class="btn btn-p btn-xs" onclick="sendReply('${f.id}','${esc(f.user_email||'')}','${esc(f.user_id||'')}')">Send reply</button>
        <button class="btn btn-g btn-xs" onclick="toggleReply('${f.id}')">Cancel</button>
      </div>
      <div id="reply-sent-${f.id}" style="font-size:.78rem;margin-top:4px"></div>
    </div>
  </div>`;
}

async function markRead(id){
  await sb.from('user_feedback').update({read_by_admin:true}).eq('id',id);
  const item=allFeedback.find(f=>f.id===id); if(item) item.read_by_admin=true;
  document.getElementById('fb-'+id)?.classList.remove('unread');
  const u=allFeedback.filter(f=>!f.read_by_admin).length;
  const b=document.getElementById('fb-badge'); b.textContent=u; b.style.display=u?'inline':'none';
}

function toggleReply(id){ document.getElementById('reply-'+id)?.classList.toggle('open'); }

async function sendReply(fbId,toEmail,toUserId){
  const txt=document.getElementById('reply-txt-'+fbId)?.value?.trim();
  if(!txt) return;
  const s=document.getElementById('reply-sent-'+fbId);
  s.textContent='Sending…'; s.style.color='var(--muted)';
  try{
    await sb.from('user_feedback').update({admin_reply:txt,admin_replied_at:new Date().toISOString(),read_by_admin:true}).eq('id',fbId);
    if(toEmail||toUserId) await sb.from('admin_messages').insert({to_user_id:toUserId||null,to_email:toEmail,subject:'Reply to your EventOps feedback',message:txt});
    const item=allFeedback.find(f=>f.id===fbId); if(item){item.admin_reply=txt;item.read_by_admin=true;}
    s.style.color='var(--good)'; s.textContent='✓ Sent';
    document.getElementById('reply-'+fbId)?.classList.remove('open');
    toast('Reply sent!');
  }catch(e){ s.style.color='var(--bad)'; s.textContent='Error: '+e.message; }
}

/* ═══ MESSAGES ══════════════════════════════════════ */
function renderMessages(){
  document.getElementById('content').innerHTML=`
    <div class="card">
      <div class="sec-h"><h3>Compose message</h3></div>
      <div class="grid g2" style="margin-bottom:12px">
        <div><label class="fl">To (email)</label><input class="ipt" id="msg-to" type="email" placeholder="user@company.co.za"></div>
        <div><label class="fl">Subject</label><input class="ipt" id="msg-subj" value="EventOps — Message from the team"></div>
      </div>
      <label class="fl">Message</label>
      <textarea class="ipt" id="msg-body" rows="5" placeholder="Write a personalised message…"></textarea>
      <div style="display:flex;gap:8px;align-items:center;margin-top:6px">
        <button class="btn btn-p btn-sm" onclick="sendAdminMsg()">Send →</button>
        <span id="msg-status" style="font-size:.8rem;color:var(--muted)"></span>
      </div>
    </div>
    <div class="card">
      <div class="sec-h"><h3>Select a company to message</h3></div>
      ${allCompanies.map(c=>`
        <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)">
          <div class="co-av" style="background:${planColor(c.plan)};width:32px;height:32px;border-radius:9px;font-size:.72rem">${(c.company_name||'?')[0].toUpperCase()}</div>
          <div style="flex:1"><div style="font-weight:600;font-size:.85rem">${esc(c.company_name||'—')}</div><div style="font-size:.72rem;color:var(--muted)">${esc(c.email||c.user_id)}</div></div>
          <span class="badge plan-${c.plan}">${c.plan}</span>
          <button class="btn btn-g btn-xs" onclick="composeToUser('${c.user_id}','${esc(c.company_name||'')}','${esc(c.email||'')}')">Select</button>
        </div>`).join('')}
    </div>`;
}

function composeToUser(userId, company, email){
  showPage('messages');
  setTimeout(()=>{
    const el=document.getElementById('msg-to'); if(el) el.value=email;
    const s=document.getElementById('msg-subj'); if(s) s.value=`EventOps — Personal message for ${company||'you'}`;
    el?.focus();
  },50);
}

async function sendAdminMsg(){
  const to=document.getElementById('msg-to')?.value?.trim();
  const subj=document.getElementById('msg-subj')?.value?.trim();
  const body=document.getElementById('msg-body')?.value?.trim();
  const st=document.getElementById('msg-status');
  if(!to||!body){ st.style.color='var(--bad)'; st.textContent='Enter recipient and message.'; return; }
  st.textContent='Sending…'; st.style.color='var(--muted)';
  try{
    const user=allCompanies.find(u=>u.email===to);
    await sb.from('admin_messages').insert({to_user_id:user?.user_id||null,to_email:to,subject:subj,message:body,sent_at:new Date().toISOString()});
    st.style.color='var(--good)'; st.textContent='✓ Delivered to inbox';
    document.getElementById('msg-body').value='';
    toast('Message sent to '+to);
    logActivity('message_sent','Admin sent message to '+to);
  }catch(e){ st.style.color='var(--bad)'; st.textContent='Error: '+e.message; }
}

/* ═══ ACTIVITY ══════════════════════════════════════ */
function renderActivity(){
  document.getElementById('content').innerHTML=`
    <div class="card">
      <div class="sec-h"><h3>Activity log</h3><span style="font-size:.75rem;color:var(--muted)">Last 100 events</span></div>
      ${allActivity.length?allActivity.map(a=>`
        <div class="act-item">
          <div class="act-ic">📡</div>
          <div style="flex:1"><div>${esc(a.description||a.type)}</div>${a.user_email?`<div style="font-size:.72rem;color:var(--muted)">${a.user_email}</div>`:''}</div>
          <div class="act-time">${timeAgo(a.created_at)}</div>
        </div>`).join(''):`<div class="empty-state">No activity recorded yet.</div>`}
    </div>`;
}

/* ═══ USAGE ═════════════════════════════════════════ */
function renderUsage(){
  const totalEvt=allCompanies.reduce((s,c)=>s+(c.events?.length||0),0);
  const totalTeam=allCompanies.reduce((s,c)=>s+(c.team?.length||0),0);
  const fbByType={};
  allFeedback.forEach(f=>{ fbByType[f.category||'other']=(fbByType[f.category||'other']||0)+1; });
  const maxFb=Math.max(...Object.values(fbByType),1);
  const topCos=[...allCompanies].sort((a,b)=>(b.events?.length||0)-(a.events?.length||0)).slice(0,8);

  document.getElementById('content').innerHTML=`
    <div class="grid g4" style="margin-bottom:16px">
      <div class="card kpi"><div class="lbl">Total Events</div><div class="v">${totalEvt}</div><div class="d">across all companies</div></div>
      <div class="card kpi"><div class="lbl">Avg Events/Company</div><div class="v">${allCompanies.length?(totalEvt/allCompanies.length).toFixed(1):0}</div></div>
      <div class="card kpi"><div class="lbl">Total Team Members</div><div class="v">${totalTeam}</div></div>
      <div class="card kpi"><div class="lbl">Feedback/Company</div><div class="v">${allCompanies.length?(allFeedback.length/allCompanies.length).toFixed(1):0}</div></div>
    </div>
    <div class="grid g2">
      <div class="card">
        <div class="sec-h"><h3>Most active companies</h3></div>
        ${topCos.map((c,i)=>`
          <div class="usage-bar-wrap" style="cursor:pointer" onclick="openCompanyDetail('${c.user_id}')">
            <div class="usage-bar-label">
              <span>${i+1}. ${esc(c.company_name||'—')}</span>
              <span>${c.events?.length||0} events</span>
            </div>
            <div class="usage-bar"><div class="usage-bar-fill" style="width:${topCos[0]?.events?.length?((c.events?.length||0)/topCos[0].events.length*100).toFixed(0):0}%"></div></div>
          </div>`).join('')}
      </div>
      <div class="card">
        <div class="sec-h"><h3>Feedback by category</h3></div>
        ${Object.entries(fbByType).map(([k,v])=>`
          <div class="usage-bar-wrap">
            <div class="usage-bar-label"><span>${catIcon(k)} ${k.replace('_',' ')}</span><span>${v}</span></div>
            <div class="usage-bar"><div class="usage-bar-fill" style="width:${(v/maxFb*100).toFixed(0)}%"></div></div>
          </div>`).join('')||'<div style="color:var(--muted);font-size:.83rem">No feedback yet.</div>'}
      </div>
    </div>`;
}

/* ═══ HELPERS ═══════════════════════════════════════ */
async function logActivity(type,description){
  try{ await sb.from('admin_activity').insert({type,description,admin_user:adminUser?.email}); }catch{}
}
function catIcon(cat){ return{bug:'🐛',feature_request:'💡',question:'❓',praise:'⭐',complaint:'😤',suggestion:'✨'}[cat]||'💬'; }
function priBadge(p){ return{urgent:'b-red',high:'b-amber',normal:'b-blue',low:'b-gray'}[p]||'b-blue'; }
function statusIcon(s){ return{active:'●',blocked:'🚫',suspended:'⚠'}[s]||'●'; }
function planColor(p){ return{beta:'#475569',starter:'#22c55e',growth:'#0BB5CC',pro:'#8B5CF6',agency:'#F59E0B'}[p]||'#475569'; }
function timeAgo(iso){
  if(!iso) return '—';
  const d=(Date.now()-new Date(iso))/1000;
  if(d<60) return 'just now';
  if(d<3600) return Math.floor(d/60)+'m ago';
  if(d<86400) return Math.floor(d/3600)+'h ago';
  if(d<2592000) return Math.floor(d/86400)+'d ago';
  return Math.floor(d/2592000)+'mo ago';
}
function fmtDate(iso){ if(!iso) return '—'; return new Date(iso).toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'}); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function toast(t){ const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2600); }

checkSession();
</script>
